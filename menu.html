<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Quizzz - Zentrale</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: sans-serif;
            margin: 0;
            padding-bottom: 80px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 15px;
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #1e293b;
            display: flex;
            justify-content: space-around;
            padding: 15px;
            border-top: 2px solid #334155;
        }

        select,
        button {
            width: 100%;
            padding: 12px;
            margin: 5px 0;
            border-radius: 8px;
            border: none;
            font-weight: bold;
        }

        .btn-start {
            background: #10b981;
            color: white;
            cursor: pointer;
        }

        .admin-item {
            background: #334155;
            padding: 10px;
            margin: 5px 0;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>

<body>

    <div class="container">
        <div id="page-home" class="page active">
            <div class="card">
                <h3>Hallo! Was lernen wir heute?</h3>
                <select id="main-category" onchange="updateSubCategories()">
                    <option value="schule2">Grundschule (Klasse 2)</option>
                    <option value="schule5">Weiterführende (Klasse 5)</option>
                    <option value="kfz">KFZ-Ausbildung</option>
                    <option value="allgemein">Sprachen & Religion</option>
                </select>
                <select id="sub-category"></select>
                <button class="btn-start" onclick="startQuiz()">Quiz starten</button>
            </div>
        </div>

        <div id="page-parent" class="page">
            <div class="card">
                <h3>Eltern-Dashboard (Admin)</h3>
                <div id="admin-list">Lade Spieler...</div>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <button onclick="switchPage('home')">🏠 Home</button>
        <button onclick="switchPage('parent')">👨‍👩‍👦 Eltern</button>
    </div>

    <script src="questions.js"></script>
    <script>
        const firebaseConfig = { /* Bitte hier deine Config einfügen */ };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function updateSubCategories() {
            const mainCat = document.getElementById("main-category").value;
            const subSelect = document.getElementById("sub-category");
            subSelect.innerHTML = "";
            getCategoriesFor(mainCat).forEach(sub => {
                const count = allQuestions.filter(q => q.category === sub.value).length;
                const opt = document.createElement("option");
                opt.value = sub.value;
                opt.innerText = `${sub.text} (${count} Fragen)`;
                subSelect.appendChild(opt);
            });
        }

        function switchPage(p) {
            document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
            document.getElementById('page-' + p).classList.add('active');
        }

        function adjustCoins(playerKey, change) {
            db.ref('players/' + playerKey).once('value', (s) => {
                let p = s.val();
                p.coins = (p.coins || 0) + change;
                db.ref('players/' + playerKey).set(p);
            });
        }

        db.ref('players').on('value', (snap) => {
            const list = document.getElementById('admin-list');
            list.innerHTML = "";
            snap.forEach(child => {
                const p = child.val();
                list.innerHTML += `<div class="admin-item">${p.name}: ${p.coins} Coins 
                <button onclick="adjustCoins('${child.key}', 10)">+10</button></div>`;
            });
        });

        window.onload = updateSubCategories;
    </script>
</body>

</html>
