<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Özdemir Familien-Quiz - Login</title>
    <!-- Externe Firebase-Bibliotheken für die Spieler-Datenbank -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: #0f111a;
            color: #ffffff;
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
        }

        .main-title {
            text-align: center;
            color: #ff6b81;
            font-size: 2.1rem;
            margin-bottom: 20px;
        }

        .profile-container {
            margin-bottom: 20px;
            background-color: #16213e;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
        }

        .profile-grid {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        .profile-card {
            background-color: #1a1a2e;
            border: 3px solid #1368ce;
            border-radius: 12px;
            padding: 12px;
            width: 95px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .profile-card:hover {
            transform: scale(1.05);
            border-color: #ff6b81;
        }

        .profile-avatar-wrapper {
            position: relative;
            width: 65px;
            height: 95px;
            background-color: #16213e;
            border-radius: 10px;
            margin: 0 auto 8px auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 2px solid #e94560;
        }

        .profile-name {
            font-weight: bold;
            font-size: 1rem;
            color: white;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .profile-coins {
            font-size: 0.8rem;
            color: #ffd700;
            margin-top: 3px;
        }

        .divider {
            margin: 20px 0;
            color: #555;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #333;
            margin: 0 15px;
        }

        .setup-section {
            background-color: #16213e;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .setup-title {
            font-size: 1.25rem;
            font-weight: bold;
            color: #ffd700;
            margin-bottom: 10px;
        }

        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border: 2px solid #1368ce;
            background-color: #1a1a2e;
            color: white;
            box-sizing: border-box;
            font-size: 1rem;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: #26890c;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #1d6a09;
        }

        .custom-error-banner {
            display: none;
            background-color: #e94560;
            color: white;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-weight: bold;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            border: 2px solid #ff6b81;
        }
    </style>
</head>

<body>

    <div class="container" id="login-screen">
        <h1 class="main-title">Özdemir Familien-Quiz 🎮</h1>

        <!-- Eleganter Fehlerbanner als Ersatz für blockierende alerts -->
        <div id="error-banner" class="custom-error-banner"></div>

        <!-- Profilauswahl für bereits registrierte Spieler -->
        <div class="profile-container" id="existing-profiles-box" style="display: none;">
            <div class="setup-title" style="margin-bottom: 5px;">Wer spielt heute? 👤</div>
            <p style="color: #aaa; font-size: 0.85rem; margin-bottom: 15px;">Tippe auf dein Profil, um direkt
                loszulegen!</p>
            <div class="profile-grid" id="profile-grid"></div>
        </div>

        <div class="divider" id="profile-divider" style="display: none;">ODER</div>

        <!-- Anmeldeformular für neue Spieler -->
        <div class="setup-section">
            <div class="setup-title" id="new-player-title">Neuen Spieler anmelden ✍️</div>
            <p style="color: #aaa; font-size: 0.85rem; margin-bottom: 5px;">Gib deinen Namen und dein Alter an:</p>

            <input type="text" id="username-input" placeholder="Dein Name..." autocomplete="off"><br>

            <div style="margin-top: 5px; margin-bottom: 15px;">
                <input type="number" id="age-input" placeholder="Dein Alter (z.B. 8)..." min="1" max="99">
            </div>

            <button id="login-btn" onclick="handleLogin()">Anmelden & Weiter 🚀</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAy5YkfW99nY3t1CxxrFI5dlqe4w2NZfj4",
            authDomain: "family-quizzz-80c40.firebaseapp.com",
            databaseURL: "https://family-quizzz-80c40-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "family-quizzz-80c40",
            storageBucket: "family-quizzz-80c40.firebasestorage.app",
            messagingSenderId: "30751445599",
            appId: "1:30751445599:web:28636f46555f5df49881ea"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function showError(message) {
            const banner = document.getElementById("error-banner");
            banner.innerText = message;
            banner.style.display = "block";
            setTimeout(() => { banner.style.display = "none"; }, 4000);
        }

        // Lauscht auf Änderungen in der Spieledatenbank und zeichnet die Avatare
        function listenToProfiles() {
            db.ref("players").on("value", (snapshot) => {
                const players = snapshot.val();
                const grid = document.getElementById("profile-grid");
                grid.innerHTML = "";

                if (players) {
                    document.getElementById("existing-profiles-box").style.display = "block";
                    document.getElementById("profile-divider").style.display = "flex";

                    Object.keys(players).forEach(key => {
                        const playerData = players[key];
                        if (playerData.name && playerData.name.toLowerCase() === "admin") return;

                        const card = document.createElement("div");
                        card.className = "profile-card";
                        card.onclick = () => loginAs(playerData.name);

                        let base = playerData.avatar ? playerData.avatar.base || "🧑" : "🧑";
                        let hat = playerData.avatar ? playerData.avatar.hat || "" : "";
                        let glasses = playerData.avatar ? playerData.avatar.glasses || "" : "";

                        card.innerHTML = `
                        <div class="profile-avatar-wrapper">
                            <span style="font-size: 2rem;">${base}${hat}${glasses}</span>
                        </div>
                        <div class="profile-name">${playerData.name}</div>
                        <div class="profile-coins">🪙 ${playerData.coins || 0}</div>
                        <div style="font-size:0.75rem; color:#aaa; margin-top:2px;">⭐ ${playerData.rankPoints || 0} Pkt.</div>
                    `;
                        grid.appendChild(card);
                    });
                }
            });
        }

        function loginAs(name) {
            sessionStorage.setItem("current_quiz_player", name);
            window.location.href = "menu.html";
        }

        function handleLogin() {
            const input = document.getElementById("username-input");
            const ageInput = document.getElementById("age-input");
            const name = input.value.trim();
            const age = parseInt(ageInput.value);

            if (!name) { showError("Bitte gib deinen Namen ein!"); return; }

            if (name.toLowerCase() === "admin") {
                sessionStorage.setItem("current_quiz_player", "Admin");
                window.location.href = "menu.html";
                return;
            }

            if (!age || age < 1) { showError("Bitte gib ein gültiges Alter an!"); return; }

            sessionStorage.setItem("current_quiz_player", name);
            let nameKey = name.toLowerCase();

            db.ref("players/" + nameKey).once("value", (snapshot) => {
                if (!snapshot.exists()) {
                    let newPlayer = {
                        name: name,
                        age: age,
                        coins: 0,
                        rankPoints: 0,
                        avatar: { base: "🧑", hat: "", glasses: "" },
                        unlockedHats: ["cap"],
                        unlockedGlasses: ["nerd"],
                        lastCategories: ["klasse2_mathe"],
                        learningProgress: 0
                    };
                    db.ref("players/" + nameKey).set(newPlayer, () => {
                        window.location.href = "avatar.html";
                    });
                } else {
                    db.ref("players/" + nameKey).update({ age: age }, () => {
                        window.location.href = "menu.html";
                    });
                }
            });
        }

        window.onload = listenToProfiles;
    </script>
</body>

</html>
