<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avatar Studio - Emoji Edition</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 15px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            text-align: center;
        }

        /* Premium Avatar Vorschau-Box */
        .avatar-display-card {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border: 3px solid #3b82f6;
            border-radius: 24px;
            padding: 30px 20px;
            margin-bottom: 20px;
            position: relative;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
        }

        /* Schicht-Anzeige für die stapelbaren Emojis */
        .emoji-avatar-viewport {
            width: 120px;
            height: 120px;
            margin: 0 auto;
            position: relative;
            background: #1e3a8a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 4px 10px rgba(0, 0, 0, 0.5);
            overflow: visible;
        }

        .emoji-layer {
            position: absolute;
            user-select: none;
            line-height: 1;
        }

        .emoji-layer.l-base {
            font-size: 4.8rem;
            z-index: 1;
            top: 18px;
        }

        .emoji-layer.l-glasses {
            font-size: 2.8rem;
            z-index: 2;
            top: 24px;
        }

        .emoji-layer.l-hat {
            font-size: 3.8rem;
            z-index: 3;
            top: -18px;
        }

        .coin-status {
            font-size: 1.3rem;
            color: #fbbf24;
            font-weight: bold;
            margin-top: 15px;
        }

        /* Shop Layout */
        .shop-section-title {
            text-align: left;
            font-size: 1.1rem;
            color: #3b82f6;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 20px 0 10px 0;
            font-weight: bold;
            border-bottom: 2px solid #334155;
            padding-bottom: 4px;
        }

        .shop-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 10px;
            margin-bottom: 15px;
        }

        /* Item Karten */
        .item-card {
            background: #1e293b;
            border: 2px solid #475569;
            border-radius: 16px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
        }

        .item-card:hover {
            transform: translateY(-2px);
            border-color: #3b82f6;
        }

        .item-emoji {
            font-size: 2.5rem;
            margin-bottom: 6px;
        }

        .item-label {
            font-size: 0.9rem;
            font-weight: bold;
            color: #f1f5f9;
        }

        /* Statustags */
        .status-tag {
            width: 100%;
            border-radius: 8px;
            padding: 6px 0;
            font-size: 0.8rem;
            font-weight: bold;
            margin-top: 8px;
            text-align: center;
            box-sizing: border-box;
        }

        .status-buy {
            background: #334155;
            color: #fbbf24;
            border: 1px solid #fbbf24;
        }

        .status-equip {
            background: #1e3a8a;
            color: #60a5fa;
        }

        .status-active {
            background: #16a34a;
            color: white;
            box-shadow: 0 0 10px rgba(22, 163, 74, 0.4);
        }

        .back-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            margin-top: 25px;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.2);
        }
    </style>
</head>

<body>

    <div class="container">
        <h2 style="color: #60a5fa; margin-top: 10px; margin-bottom: 15px;">Avatar Studio 🎨</h2>

        <!-- AVATAR LIVE VORSCHAU -->
        <div class="avatar-display-card">
            <div class="emoji-avatar-viewport">
                <div id="p-base" class="emoji-layer l-base">🧑</div>
                <div id="p-glasses" class="emoji-layer l-glasses"></div>
                <div id="p-hat" class="emoji-layer l-hat"></div>
            </div>
            <div class="coin-status">🪙 Deine Coins: <span id="shop-coins">0</span></div>
        </div>

        <!-- HÜTE BEREICH -->
        <div class="shop-section-title">🎩 Hüte & Kronen</div>
        <div id="hats-grid" class="shop-grid"></div>

        <!-- BRILLEN BEREICH -->
        <div class="shop-section-title">🕶️ Brillen & Masken</div>
        <div id="glasses-grid" class="shop-grid"></div>

        <button onclick="window.location.href='menu.html'" class="back-btn">Zurück zum Hauptmenü 🔙</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAy5YkfW99nY3t1CxxrFI5dlqe4w2NZfj4",
            authDomain: "family-quizzz-80c40.firebaseapp.com",
            databaseURL: "https://family-quizzz-80c40-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "family-quizzz-80c40",
            storageBucket: "family-quizzz-80c40.firebasestorage.app",
            messagingSenderId: "30751445599",
            appId: "1:30751445599:web:28636f46555f5df49881ea"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let playerName = sessionStorage.getItem("current_quiz_player");
        let currentPlayer = null;

        // EMOJI ITEM DATENBANK
        const shopHats = [
            { id: "none_hat", label: "Kein Hut", price: 0, emoji: "" },
            { id: "cap", label: "Basecap", price: 25, emoji: "🧢" },
            { id: "cowboy", label: "Cowboyhut", price: 60, emoji: "🤠" },
            { id: "crown", label: "Goldene Krone", price: 200, emoji: "👑" },
            { id: "magician", label: "Zylinder", price: 120, emoji: "🎩" },
            { id: "chef", label: "Kochmütze", price: 75, emoji: "👨‍🍳" }
        ];

        const shopGlasses = [
            { id: "none_glasses", label: "Keine Brille", price: 0, emoji: "" },
            { id: "nerd", label: "Nerdbrille", price: 20, emoji: "🤓" },
            { id: "sun", label: "Sonnenbrille", price: 45, emoji: "😎" },
            { id: "heart", label: "Herzbrille", price: 90, emoji: "❤️" },
            { id: "monocle", label: "Monokel", price: 110, emoji: "🧐" }
        ];

        db.ref("players/" + (playerName ? playerName.toLowerCase() : "")).on("value", (snapshot) => {
            currentPlayer = snapshot.val();
            if (currentPlayer) {
                if (!currentPlayer.unlockedHats) currentPlayer.unlockedHats = ["none_hat"];
                if (!currentPlayer.unlockedGlasses) currentPlayer.unlockedGlasses = ["none_glasses"];

                document.getElementById("shop-coins").innerText = currentPlayer.coins || 0;
                updatePreview();
                renderShopUI();
            }
        });

        function updatePreview() {
            let hatEmoji = currentPlayer.avatar ? currentPlayer.avatar.hat || "" : "";
            let glassesEmoji = currentPlayer.avatar ? currentPlayer.avatar.glasses || "" : "";

            document.getElementById("p-base").innerText = currentPlayer.avatar ? currentPlayer.avatar.base || "🧑" : "🧑";
            document.getElementById("p-hat").innerText = hatEmoji;
            document.getElementById("p-glasses").innerText = glassesEmoji;
        }

        function renderShopUI() {
            renderGrid("hats-grid", shopHats, 'hat', currentPlayer.unlockedHats);
            renderGrid("glasses-grid", shopGlasses, 'glasses', currentPlayer.unlockedGlasses);
        }

        function renderGrid(containerId, itemsList, itemType, unlockedCollection) {
            const grid = document.getElementById(containerId);
            grid.innerHTML = "";

            itemsList.forEach(item => {
                const card = document.createElement("div");
                card.className = "item-card";

                let currentEquipped = currentPlayer.avatar ? currentPlayer.avatar[itemType] || "" : "";
                let isCurrentlyEquipped = (currentEquipped === item.emoji && item.id !== "none_hat" && item.id !== "none_glasses") ||
                    (item.id === "none_hat" && currentEquipped === "") ||
                    (item.id === "none_glasses" && currentEquipped === "");

                let isUnlocked = unlockedCollection.includes(item.id);

                let statusBtnHtml = "";
                if (isCurrentlyEquipped) {
                    statusBtnHtml = `<div class="status-tag status-active">Aktiviert ✅</div>`;
                } else if (isUnlocked) {
                    statusBtnHtml = `<div class="status-tag status-equip">Ausrüsten 🔄</div>`;
                } else {
                    statusBtnHtml = `<div class="status-tag status-buy">🪙 ${item.price}</div>`;
                }

                card.innerHTML = `
                <div class="item-emoji">${item.emoji || "❌"}</div>
                <div class="item-label">${item.label}</div>
                ${statusBtnHtml}
            `;

                card.onclick = () => {
                    if (isUnlocked) {
                        equip(itemType, item.emoji);
                    } else {
                        buy(itemType, item);
                    }
                };

                grid.appendChild(card);
            });
        }

        function buy(type, item) {
            if ((currentPlayer.coins || 0) >= item.price) {
                currentPlayer.coins -= item.price;
                if (type === 'hat') { currentPlayer.unlockedHats.push(item.id); }
                else { currentPlayer.unlockedGlasses.push(item.id); }

                if (!currentPlayer.avatar) currentPlayer.avatar = { base: "🧑", hat: "", glasses: "" };
                currentPlayer.avatar[type] = item.emoji;

                db.ref("players/" + playerName.toLowerCase()).set(currentPlayer, () => {
                    confetti({ particleCount: 30, spread: 40 });
                });
            } else {
                alert("Nicht genug Coins! 🪙");
            }
        }

        function equip(type, emoji) {
            if (!currentPlayer.avatar) currentPlayer.avatar = { base: "🧑", hat: "", glasses: "" };
            currentPlayer.avatar[type] = emoji;
            db.ref("players/" + playerName.toLowerCase()).set(currentPlayer);
        }
    </script>
</body>

</html>
