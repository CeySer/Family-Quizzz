<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Arena - Family Quizzz</title>
    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: #0f111a;
            color: #ffffff;
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }

        .quiz-image {
            max-width: 100%;
            max-height: 220px;
            border-radius: 12px;
            margin: 0 auto 15px auto;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
            display: none;
            object-fit: contain;
        }

        .option-btn {
            padding: 15px 20px;
            background: #1f4068;
            color: white;
            border: 2px solid transparent;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.15);
        }

        .option-btn:hover:not(:disabled) {
            background: #162d4a;
            transform: translateY(-2px);
        }

        .option-btn.correct-glow {
            background: #26890c !important;
            border-color: #ffd700;
            box-shadow: 0 0 15px rgba(38, 137, 12, 0.6);
            opacity: 1 !important;
        }

        .option-btn.wrong-glow {
            background: #e94560 !important;
            box-shadow: 0 0 15px rgba(233, 69, 96, 0.6);
            opacity: 1 !important;
        }

        .explanation-card {
            background: #1a1a2e;
            border-left: 5px solid #ffd700;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            text-align: left;
            font-size: 0.95rem;
            color: #eee;
            line-height: 1.5;
            display: none;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>

<body>

    <div class="container">
        <!-- TIMER-LEISTE FÜR DEN LERNMODUS -->
        <div id="learning-chest-bar"
            style="display: none; background: #1f4068; padding: 12px; border-radius: 12px; margin-bottom: 15px; text-align: center; border: 2px solid #ffd700; font-weight: bold; color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.3);">
            🎁 Lernzeit bis zur epischen Schatzkiste: <span id="chest-timer-display"
                style="color: #ffd700;">15:00</span> Min
        </div>

        <!-- SPIEL-STEUERUNGSLEISTE -->
        <div
            style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; color: white;">
            <button onclick="leaveQuiz()"
                style="background: #e94560; color: white; border: none; padding: 10px 18px; border-radius: 10px; font-weight: bold; cursor: pointer; transition: background 0.2s;">Beenden
                🏠</button>
            <span
                style="font-size: 1.3rem; font-weight: bold; color: #ffd700; background: #16213e; padding: 8px 15px; border-radius: 10px; border: 1px solid #1368ce; display: flex; align-items: center; gap: 5px;">
                🪙 <span id="quiz-coins">0</span>
            </span>
        </div>

        <!-- SPIELFELD -->
        <div id="quiz-box"
            style="background: #16213e; padding: 22px; border-radius: 16px; text-align: center; color: white; box-shadow: 0 10px 25px rgba(0,0,0,0.4); border: 1px solid #1f4068;">
            <!-- Bild wird vollautomatisch ausgeblendet, falls die Datei fehlt -->
            <img id="question-image" class="quiz-image" src="" alt="Quiz Bild" onerror="this.style.display='none';">

            <h2 id="question-text" style="color: #ff6b81; margin-top: 5px; font-size: 1.35rem; line-height: 1.4;">Lade
                Frage...</h2>
            <div id="options-container" style="display: flex; flex-direction: column; gap: 12px; margin-top: 20px;">
            </div>

            <!-- Erklärungskarte, die bei Fehlern erscheint -->
            <div id="explanation-box" class="explanation-card"></div>

            <!-- Erst nach falscher Antwort einblenden -->
            <button id="next-btn"
                style="display: none; margin-top: 20px; background: #ffd700; color: #111; font-weight: bold; border: none; padding: 15px; border-radius: 12px; font-size: 1.2rem; width: 100%; cursor: pointer; box-shadow: 0 4px 10px rgba(255, 215, 0, 0.3);"
                onclick="nextQuestion()">Nächste Frage ➔</button>
        </div>
    </div>

    <!-- KISTEN-OVERLAY -->
    <div id="chest-overlay"
        style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10,10,25,0.97); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; padding: 20px; box-sizing: border-box;">
        <h1
            style="color: #ffd700; font-size: 2.2rem; margin-bottom: 10px; text-shadow: 0 0 15px rgba(255, 215, 0, 0.4);">
            🎉 15 MINUTEN GELERNT! 🎉</h1>
        <p style="color: #eee; font-size: 1.1rem; margin-bottom: 25px;">Du warst unglaublich fleißig!</p>
        <div id="chest-emoji" style="font-size: 8rem; cursor: pointer; transition: transform 0.2s;"
            onclick="openChest()">🎁</div>
        <p id="chest-instruction" style="color: #ffd700; margin-top: 15px; font-weight: bold;">Klicke auf das Geschenk,
            um es zu öffnen!</p>

        <div id="reward-display" style="display: none; margin-top: 20px;">
            <h2 style="color: #ff6b81; font-size: 1.6rem;">Neues episches Item freigeschaltet!</h2>
            <div id="reward-emoji" style="font-size: 5.5rem; margin: 15px 0;">👑</div>
            <h3 id="reward-name" style="color: #ffd700; font-size: 1.4rem;">Goldene Krone</h3>
            <button onclick="closeChestAndContinue()"
                style="background: #26890c; color: white; border: none; padding: 14px 35px; border-radius: 10px; font-size: 1.2rem; font-weight: bold; cursor: pointer; margin-top: 25px; box-shadow: 0 5px 15px rgba(38,137,12,0.4);">Genial!
                Weiter ➔</button>
        </div>
    </div>

    <script src="questions.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAy5YkfW99nY3t1CxxrFI5dlqe4w2NZfj4",
            authDomain: "family-quizzz-80c40.firebaseapp.com",
            databaseURL: "https://family-quizzz-80c40-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "family-quizzz-80c40",
            storageBucket: "family-quizzz-80c40.firebasestorage.app",
            messagingSenderId: "30751445599",
            appId: "1:30751445599:web:28636f46555f5df49881ea"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let playerName = sessionStorage.getItem("current_quiz_player");
        let settings = JSON.parse(sessionStorage.getItem("quiz_settings")) || { categories: ["klasse2_mathe"], mode: "spiel" };
        let currentPlayer = null;
        let currentQuestionIndex = 0;
        let filteredQuestions = [];
        let hasAnswered = false;

        let learningSeconds = 0;
        let learningInterval = null;
        const SECONDS_NEEDED_FOR_CHEST = 900; // 15 Min

        // Überwachung nur aktivieren, wenn ein gültiger Nicht-Admin Name eingeloggt ist
        if (playerName && playerName.toLowerCase() !== "admin") {
            db.ref("players/" + playerName.toLowerCase()).on("value", (snapshot) => {
                currentPlayer = snapshot.val();
                if (currentPlayer) {
                    document.getElementById("quiz-coins").innerText = currentPlayer.coins || 0;
                    if (!currentPlayer.unlockedHats) currentPlayer.unlockedHats = [];
                    if (!currentPlayer.unlockedGlasses) currentPlayer.unlockedGlasses = [];
                }
            });
        } else if (playerName && playerName.toLowerCase() === "admin") {
            document.getElementById("quiz-coins").innerText = "99999 (Admin)";
        }

        function initQuiz() {
            if (typeof allQuestions === "undefined" || !Array.isArray(allQuestions) || allQuestions.length === 0) {
                document.getElementById("question-text").innerText = "❌ Fehler: Die Fragensammlung 'questions.js' wurde nicht gefunden oder ist leer!";
                return;
            }

            filteredQuestions = allQuestions.filter(q => settings.categories.includes(q.category));

            if (filteredQuestions.length === 0) {
                filteredQuestions = allQuestions;
            }

            // Mischen der Fragen für mehr Abwechslung
            filteredQuestions.sort(() => Math.random() - 0.5);

            showQuestion();

            if (settings.mode === "lernen" && playerName && playerName.toLowerCase() !== "admin") {
                startLearningTimer();
            }
        }

        function showQuestion() {
            if (filteredQuestions.length === 0) return;
            hasAnswered = false;

            document.getElementById("next-btn").style.display = "none";
            document.getElementById("explanation-box").style.display = "none";

            let q = filteredQuestions[currentQuestionIndex];
            document.getElementById("question-text").innerText = `[#${q.id}] ${q.question}`;

            let imgEl = document.getElementById("question-image");
            if (q.image && q.image.trim() !== "") {
                imgEl.src = q.image;
                imgEl.style.display = "inline-block";
            } else {
                imgEl.style.display = "none";
                imgEl.src = "";
            }

            let container = document.getElementById("options-container");
            container.innerHTML = "";

            q.answers.forEach((ans, idx) => {
                let btn = document.createElement("button");
                btn.innerText = ans;
                btn.className = "option-btn";
                btn.onclick = () => handleAnswer(btn, idx, q.correct, q.explanation);
                container.appendChild(btn);
            });
        }

        function handleAnswer(clickedBtn, selectedIdx, correctIdx, explanationText) {
            if (hasAnswered) return;
            hasAnswered = true;

            let isCorrect = (selectedIdx === correctIdx);
            let buttons = document.querySelectorAll(".option-btn");

            buttons.forEach((btn, idx) => {
                btn.disabled = true;
                btn.style.opacity = "0.3";
                if (idx === correctIdx) {
                    btn.className = "option-btn correct-glow";
                    btn.style.opacity = "1";
                }
            });

            if (isCorrect) {
                if (playerName && playerName.toLowerCase() !== "admin") {
                    let age = currentPlayer ? currentPlayer.age || 10 : 10;
                    let multiplier = age < 8 ? 5 : (age <= 10 ? 3 : (age <= 14 ? 2 : 1));

                    db.ref("players/" + playerName.toLowerCase()).transaction((p) => {
                        if (p) {
                            p.coins = (p.coins || 0) + 10;
                            p.rankPoints = (p.rankPoints || 0) + (1 * multiplier);
                        }
                        return p;
                    });
                    confetti({ particleCount: 45, spread: 50 });
                }
                setTimeout(nextQuestion, 1300);
            } else {
                clickedBtn.className = "option-btn wrong-glow";
                clickedBtn.style.opacity = "1";

                let expBox = document.getElementById("explanation-box");
                expBox.innerHTML = explanationText || "💡 <strong>Tipp:</strong> Lies dir die Frage noch einmal genau durch. Beim nächsten Versuch klappt es bestimmt!";
                expBox.style.display = "block";

                document.getElementById("next-btn").style.display = "block";
            }
        }

        function nextQuestion() {
            if (filteredQuestions.length === 0) return;
            currentQuestionIndex = (currentQuestionIndex + 1) % filteredQuestions.length;
            showQuestion();
        }

        function startLearningTimer() {
            if (!playerName || playerName.toLowerCase() === "admin") return;

            document.getElementById("learning-chest-bar").style.display = "block";

            db.ref("players/" + playerName.toLowerCase() + "/learningProgress").once("value", (snapshot) => {
                learningSeconds = snapshot.val() || 0;
                updateChestDisplay();

                learningInterval = setInterval(() => {
                    learningSeconds++;
                    updateChestDisplay();

                    if (learningSeconds % 10 === 0) {
                        db.ref("players/" + playerName.toLowerCase() + "/learningProgress").set(learningSeconds);
                    }

                    if (learningSeconds >= SECONDS_NEEDED_FOR_CHEST) {
                        clearInterval(learningInterval);
                        document.getElementById("chest-overlay").style.display = "flex";
                    }
                }, 1000);
            });
        }

        function updateChestDisplay() {
            let remaining = Math.max(0, SECONDS_NEEDED_FOR_CHEST - learningSeconds);
            let mins = Math.floor(remaining / 60);
            let secs = remaining % 60;
            document.getElementById("chest-timer-display").innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }

        function openChest() {
            if (!playerName || playerName.toLowerCase() === "admin") return;

            const epicHats = [
                { id: "halo", label: "Heiligenschein 😇", emoji: "😇" },
                { id: "ninja", label: "Ninja-Stirnband 🥷", emoji: "🥷" },
                { id: "crown", label: "Goldene Krone 👑", emoji: "👑" }
            ];
            let prize = epicHats[Math.floor(Math.random() * epicHats.length)];

            if (!currentPlayer) {
                currentPlayer = {
                    name: playerName,
                    coins: 0,
                    rankPoints: 0,
                    avatar: { base: "🧑", hat: "", glasses: "" },
                    unlockedHats: [],
                    unlockedGlasses: []
                };
            }
            if (!currentPlayer.unlockedHats) currentPlayer.unlockedHats = [];
            if (!currentPlayer.unlockedGlasses) currentPlayer.unlockedGlasses = [];

            if (!currentPlayer.unlockedHats.includes(prize.id)) {
                currentPlayer.unlockedHats.push(prize.id);
            }
            if (!currentPlayer.avatar) currentPlayer.avatar = {};
            currentPlayer.avatar.hat = prize.emoji;

            db.ref("players/" + playerName.toLowerCase()).set(currentPlayer);
            db.ref("players/" + playerName.toLowerCase() + "/learningProgress").set(0);

            document.getElementById("chest-emoji").style.display = "none";
            document.getElementById("chest-instruction").style.display = "none";
            document.getElementById("reward-emoji").innerText = prize.emoji;
            document.getElementById("reward-name").innerText = prize.label;
            document.getElementById("reward-display").style.display = "block";

            confetti({ particleCount: 120, spread: 80 });
        }

        function closeChestAndContinue() {
            document.getElementById("chest-overlay").style.display = "none";
            document.getElementById("chest-emoji").style.display = "block";
            document.getElementById("chest-instruction").style.display = "block";
            document.getElementById("reward-display").style.display = "none";
            learningSeconds = 0;
            startLearningTimer();
        }

        function leaveQuiz() {
            if (learningInterval) clearInterval(learningInterval);
            window.location.href = 'menu.html';
        }

        window.onload = initQuiz;
    </script>
</body>

</html>
