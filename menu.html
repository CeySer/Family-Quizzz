<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zentrale - Family Quizzz</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: sans-serif;
            margin: 0;
            padding-bottom: 80px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 15px;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 15px;
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #1e293b;
            display: flex;
            justify-content: space-around;
            padding: 15px;
            border-top: 2px solid #334155;
        }

        .btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
        }

        .input-mini {
            width: 60px;
            padding: 5px;
            border-radius: 4px;
            border: none;
        }
    </style>
</head>

<body>

    <div class="container">
        <!-- Home Reiter -->
        <div id="page-home" class="page active">
            <div class="card">
                <h2>Hallo Ceyhun, willkommen zurück!</h2>
                <select id="main-category" onchange="updateSubCategories()"></select>
                <select id="sub-category"></select>
                <button class="btn" onclick="startQuiz()">Quiz starten</button>
            </div>
        </div>

        <!-- Eltern Reiter -->
        <div id="page-parent" class="page">
            <div class="card">
                <h2>Eltern-Dashboard</h2>
                <div id="admin-list">Lade Spieler...</div>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <button onclick="switchPage('home')">Home</button>
        <button onclick="switchPage('parent')">Eltern</button>
    </div>

    <script src="questions.js"></script>
    <script>
        const firebaseConfig = { /* Deine Daten hier einfügen */ };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function updateSubCategories() {
            const mainCat = document.getElementById("main-category").value;
            const subSelect = document.getElementById("sub-category");
            subSelect.innerHTML = "";
            // Hier greifen wir auf allQuestions aus deiner questions.js zu
            const subData = getCategoriesFor(mainCat);
            subData.forEach(sub => {
                const count = allQuestions.filter(q => q.category === sub.value).length;
                const opt = document.createElement("option");
                opt.innerText = `${sub.text} (${count} Fragen)`;
                subSelect.appendChild(opt);
            });
        }

        function switchPage(p) {
            document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
            document.getElementById('page-' + p).classList.add('active');
        }

        function adjustCoins(playerName, amount) {
            db.ref('players/' + playerName).once('value', (snap) => {
                let p = snap.val();
                p.coins = (p.coins || 0) + parseInt(amount);
                db.ref('players/' + playerName).set(p);
            });
        }

        // Beim Laden: Spieler anzeigen für Admin
        db.ref('players').on('value', (snap) => {
            const list = document.getElementById('admin-list');
            list.innerHTML = "";
            snap.forEach(child => {
                const p = child.val();
                list.innerHTML += `<div>${p.name}: ${p.coins} Coins 
                <button onclick="adjustCoins('${child.key}', 10)">+10</button></div>`;
            });
        });
    </script>
</body>

</html>
