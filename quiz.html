            { category: "buecher", question: "Die drei ???: Wie heißt der schlaue, erste Detektiv aus Rocky Beach?", answers: ["Peter Shaw", "Bob Andrews", "Justus Jonas", "Tom Sawyer"], correct: 2 },
            { category: "buecher", question: "Jim Knopf: Wie heißt die treue, dicke Dampflokomotive von Lukas dem Lokomotivführer?", answers: ["Emma", "Berta", "Molly", "Susi"], correct: 0 },
            { category: "buecher", question: "Jim Knopf: Auf welcher winzigen Insel mit zwei Bergen startet die Reise?", answers: ["Nimmerland", "Lummerland", "Agrabah", "Schmuddelfing"], correct: 1 },
            { category: "buecher", question: "Heidi: Wo wohnt Heidi zusammen mit ihrem Großvater, dem Almöhi?", answers: ["Am Meer", "In den Schweizer Alpen (Bergen)", "Im tiefen Wald", "In einer großen Stadt"], correct: 1 },
            { category: "buecher", question: "Wie heißt das Sams aus den Büchern von Paul Maar im Gesicht voller blauer Punkte?", answers: ["Wunschpunkte", "Sommersprossen", "Zauberpunkte", "Glückspunkte"], correct: 0 },
            { category: "buecher", question: "Urmel aus dem Eis: Was für ein Tier schlüpft auf der Insel Titiwu aus dem Ei?", answers: ["Ein Mammut", "Ein Urzeit-Dinosaurier", "Ein Riesen-Vogel", "Eine Schildkröte"], correct: 1 },

            // --- KATEGORIE: 2. KLASSE ---
            { category: "klasse2", question: "Rechne aus: Was ergibt 12 + 7?", answers: ["15", "18", "19", "20"], correct: 2 },
            { category: "klasse2", question: "Deutsch: Welches Wort reimt sich perfekt auf das Wort 'Maus'?", answers: ["Brot", "Haus", "Katze", "Milch"], correct: 1 },
            { category: "klasse2", question: "Rechne aus: Was ist 20 - 6?", answers: ["12", "13", "14", "15"], correct: 2 },
            { category: "klasse2", question: "Englisch: Welches Tier ist eine englische 'cat'?", answers: ["Ein Hund", "Ein Vogel", "Eine Katze", "Ein Pferd"], correct: 2 },
            { category: "klasse2", question: "Deutsch: Welcher Buchstabe fehlt im Wort 'L_ebe'?", answers: ["i", "o", "ie", "u"], correct: 2 },
            { category: "klasse2", question: "Sachkunde: Welches stachelige Tier hält im Winter einen langen Winterschlaf?", answers: ["Eichhörnchen", "Igel", "Hase", "Amsel"], correct: 1 },
            { category: "klasse2", question: "Mathe: Was ist das Doppelte von der Zahl 8?", answers: ["12", "14", "16", "18"], correct: 2 },
            { category: "klasse2", question: "Deutsch: Welches dieser Wörter ist ein Nomen (Namenwort) und muss großgeschrieben werden?", answers: ["rennen", "Baum", "schnell", "unter"], correct: 1 },
            { category: "klasse2", question: "Englisch: Welche Zahl ist auf Deutsch gesucht, wenn man 'four' sagt?", answers: ["Zwei", "Drei", "Vier", "Fünf"], correct: 2 },
            { category: "klasse2", question: "Sachkunde: Welche Farbe hat der Löwenzahn auf der Wiese, bevor er zur Pusteblume wird?", answers: ["Rot", "Blau", "Weiß", "Gelb"], correct: 3 },

            // --- KATEGORIE: 4. KLASSE ---
            { category: "klasse4", question: "Deutsch: Welches Wort ist ein Nomen (Substantiv)?", answers: ["schnell", "laufen", "Der Baum", "schön"], correct: 2 },
            { category: "klasse4", question: "Mathe: Was ergibt 120 x 3?", answers: ["320", "360", "400", "420"], correct: 1 },
            { category: "klasse4", question: "Sachkunde: Welcher Fluss fließt durch Köln und Düsseldorf?", answers: ["Donau", "Elbe", "Rhein", "Weser"], correct: 2 },
            { category: "klasse4", question: "Englisch: Wie heißt 'Freitag' auf Englisch?", answers: ["Monday", "Thursday", "Friday", "Saturday"], correct: 2 },
            { category: "klasse4", question: "Sachkunde: Welches ist das kleinste Bundesland der Bundesrepublik Deutschland?", answers: ["Saarland", "Bremen", "Hamburg", "Berlin"], correct: 1 },
            { category: "klasse4", question: "Mathe: Was ist 1000 - 350?", answers: ["550", "650", "700", "750"], correct: 1 },
            { category: "klasse4", question: "Deutsch: Wie heißt die Vergangenheitsform (Präteritum) von 'er geht'?", answers: ["er ging", "er ist gegangen", "er wird gehen", "er gehte"], correct: 0 },
            { category: "klasse4", question: "Sachkunde: Welcher Baum verliert im Winter seine Nadeln?", answers: ["Fichte", "Tanne", "Lärche", "Kiefer"], correct: 2 },
            { category: "klasse4", question: "Mathe: Wie viele Minuten hat eine halbe Stunde?", answers: ["15 Minuten", "30 Minuten", "45 Minuten", "60 Minuten"], correct: 1 },
            { category: "klasse4", question: "Englisch: Übersetze: 'I have a dog.'", answers: ["Ich mag Katzen.", "Ich habe einen Hund.", "Der Hund schläft.", "Das ist ein Tier."], correct: 1 },

            // --- KATEGORIE: KFZ-MECHATRONIKER (LF 1-4) ---
            { category: "kfz", question: "LF 1: Welche Aufgabe hat die Motorkühlung hauptsächlich?", answers: ["Den Motor auf Betriebstemperatur halten", "Kältemittel für die Klimaanlage herstellen", "Den Abgasstrom drosseln", "Die Lichtmaschine antreiben"], correct: 0 },
            { category: "kfz", question: "LF 1: Warum darf das Kühlsystem bei heißem Motor nicht sofort geöffnet werden?", answers: ["Das Thermostat bricht sonst ab", "Verbrühungsgefahr durch herausspritzenden Wasserdampf", "Die Wasserpumpe läuft trocken", "Es kommt Luft ins Bremssystem"], correct: 1 },
            { category: "kfz", question: "LF 2: Welches Prüfmittel eignet sich besonders zum präzisen Messen von Ventilspiel?", answers: ["Fühlerlehre", "Messschieber", "Bügelmessschraube", "Messuhr"], correct: 0 },
            { category: "kfz", question: "LF 2: Welche Angabe auf einer Schraube (z.B. 8.8) beschreibt die mechanischen Eigenschaften?", answers: ["Die Gewindesteigung", "Die Festigkeitsklasse", "Den Schraubendurchmesser", "Die Korrosionsbeständigkeit"], correct: 1 },
            { category: "kfz", question: "LF 3: Wie verhalten sich Stromstärke und Spannung in einer Reihenschaltung von Widerständen?", answers: ["Die Stromstärke ist überall gleich groß", "Die Spannung ist überall gleich groß", "Der Gesamtwiderstand sinkt", "Die Leistung wird halbiert"], correct: 0 },
            { category: "kfz", question: "LF 3: Welches Messgerät schaltet man parallel zum Verbraucher, um die anliegende Spannung zu messen?", answers: ["Amperemeter", "Voltmeter", "Ohmmeter", "Oszilloskop"], correct: 1 },
            { category: "kfz", question: "LF 4: Was muss beim Einbau einer mechanischen Anhängerkupplung (AHK) zwingend beachtet werden?", answers: ["Der Reifendruck muss erhöht werden", "Die Befestigungspunkte müssen den Herstellervorgaben entsprechen", "Der Kühlergrill muss demontiert werden", "Es muss Getriebeöl nachgefüllt werden"], correct: 1 },
            { category: "kfz", question: "LF 1: Wie sehen Reifen aus, die dauerhaft mit zu hohem Luftdruck gefahren wurden?", answers: ["Starke Abnutzung an den Reifenschultern", "Starke Abnutzung in der Reifenmitte", "Sägezahnbildung am Außenrand", "Ungleichmäßige, wellige Flecken"], correct: 1 },
            { category: "kfz", question: "LF 3: Welche gesetzlich vorgeschriebene Sicherheitsregel muss beim Arbeiten an Hochvoltfahrzeugen als Erstes befolgt werden?", answers: ["Batteriepole einfetten", "Spannungsfreiheit feststellen und sichern (Freischalten)", "Zündkerzen herausschrauben", "Kühlwasser ablassen"], correct: 1 },
            { category: "kfz", question: "LF 4: Was bedeutet die Kennzeichnung 'TWI' auf der Reifenflanke?", answers: ["Zulässige Tragfähigkeit", "Tread Wear Indicator (Abriebindikator der Mindestprofiltiefe)", "Höchstgeschwindigkeit des Reifens", "Herstellungsdatum des Reifens (DOT)"], correct: 1 }
        ];

        let playerName = sessionStorage.getItem("current_quiz_player") || "Spieler";
        let currentPlayer = JSON.parse(localStorage.getItem("quiz_player_" + playerName.toLowerCase())) || { coins: 0 };

        // Fallback falls im SessionStorage mal nichts ankommt
        let settings = JSON.parse(sessionStorage.getItem("quiz_settings")) || { categories: ["sprachen"], count: 5, timer: 20 };

        let quizQuestions = []; let currentQuestionIndex = 0; let answered = false;
        let correctAnswersCount = 0; let wrongAnswersCount = 0;
        let timerInterval; let autoNextTimeout; let timeLeft = 20;
        let audioCtx;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playTone(freq, type, duration, startTimeOffset = 0) {
            initAudio();
            setTimeout(() => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type; osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.6, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + duration);
            }, startTimeOffset);
        }

        function playTickSound() { playTone(800, 'triangle', 0.03, 0); }
        function playCorrectSound() { playTone(523.25, 'sine', 0.1, 0); playTone(659.25, 'sine', 0.15, 80); }
        function playRararaSound() { let now = 0; for (let i = 0; i < 9; i++) { playTone(180 - (i * 5), 'sawtooth', 0.06, now); now += 70; } }
        function playVictorySound() { playTone(523.25, 'sine', 0.12, 0); playTone(659.25, 'sine', 0.12, 120); playTone(783.99, 'sine', 0.12, 240); playTone(1046.50, 'sine', 0.4, 360); }
        function playGameOverSound() { playTone(220.00, 'triangle', 0.2, 0); playTone(207.65, 'triangle', 0.2, 200); playTone(196.00, 'triangle', 0.4, 400); }

        const canvas = document.getElementById('rain-canvas'); const ctx = canvas.getContext('2d');
        let rainDrops = []; let rainAnimation;
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas); resizeCanvas();
        function createRain() { rainDrops = []; for (let i = 0; i < 100; i++) { rainDrops.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height - canvas.height, length: Math.random() * 20 + 10, speed: Math.random() * 15 + 10 }); } }
        function drawRain() { ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.strokeStyle = 'rgba(174, 194, 224, 0.5)'; ctx.lineWidth = 2; ctx.lineCap = 'round'; rainDrops.forEach(drop => { ctx.beginPath(); ctx.moveTo(drop.x, drop.y); ctx.lineTo(drop.x, drop.y + drop.length); ctx.stroke(); drop.y += drop.speed; if (drop.y > canvas.height) { drop.y = -drop.length; drop.x = Math.random() * canvas.width; } }); rainAnimation = requestAnimationFrame(() => drawRain()); }
        function startRain() { document.getElementById('rain-canvas').style.display = 'block'; createRain(); drawRain(); }
        function stopRain() { document.getElementById('rain-canvas').style.display = 'none'; cancelAnimationFrame(rainAnimation); }

        function initQuiz() {
            // FILTER-KORREKTUR: FILTERT NUN GEZIELT NACH ALLEN GEWÄHLTEN KATEGORIEN
            let filtered = allQuestions.filter(q => settings.categories && settings.categories.includes(q.category));

            // BEHEBUNG DES HÄNGER-FEHLERS (Das Sicherheitsnetz):
            // Falls das Filtern schiefgeht oder leer ist, nimmt er einfach den gesamten Fragenpool, damit das Spiel niemals einfriert!
            if (filtered.length === 0) {
                filtered = allQuestions;
            }

            let shuffled = filtered.sort(() => 0.5 - Math.random());
            let questionLimit = settings.count || 5;
            quizQuestions = shuffled.slice(0, Math.min(questionLimit, shuffled.length));

            currentQuestionIndex = 0;
            correctAnswersCount = 0;
            wrongAnswersCount = 0;

            showQuestion();
        }

        function clearStorm() { document.body.classList.remove('stormy'); document.getElementById('clouds').classList.remove('show'); stopRain(); }

        function showQuestion() {
            answered = false; document.getElementById('next-btn').style.display = 'none'; clearStorm(); clearTimeout(autoNextTimeout);
            document.getElementById('question-counter').innerText = `Frage ${currentQuestionIndex + 1} von ${quizQuestions.length}`;
            let currentQuestion = quizQuestions[currentQuestionIndex];
            document.getElementById('question').innerText = currentQuestion.question;
            const btnBox = document.getElementById('answer-buttons'); btnBox.innerHTML = '';
            currentQuestion.answers.forEach((answer, index) => {
                const button = document.createElement('button'); button.innerText = answer; button.classList.add('btn', `btn-${index}`);
                button.addEventListener('click', () => selectAnswer(index)); btnBox.appendChild(button);
            });
            startTimer();
        }

        function startTimer() {
            clearInterval(timerInterval);
            timeLeft = settings.timer || 20;
            document.getElementById('timer-count').innerText = timeLeft;
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer-count').innerText = timeLeft;
                if (timeLeft <= 5 && timeLeft > 0) { playTickSound(); }
                if (timeLeft <= 0) { clearInterval(timerInterval); timeOut(); }
            }, 1000);
        }

        function triggerWrongEffects() { playRararaSound(); document.body.classList.add('stormy'); document.getElementById('clouds').classList.add('show'); startRain(); }

        function timeOut() {
            if (answered) return; answered = true; wrongAnswersCount++; triggerWrongEffects();
            const currentQuestion = quizQuestions[currentQuestionIndex]; const buttons = document.getElementsByClassName('btn');
            for (let i = 0; i < buttons.length; i++) { if (i === currentQuestion.correct) buttons[i].classList.add('correct'); else buttons[i].classList.add('fade'); }
            document.getElementById('next-btn').style.display = 'inline-block'; autoNextTimeout = setTimeout(nextQuestion, 5000);
        }

        function selectAnswer(selectedIndex) {
            if (answered) return; answered = true; clearInterval(timerInterval);
            const currentQuestion = quizQuestions[currentQuestionIndex]; const buttons = document.getElementsByClassName('btn');
            if (selectedIndex === currentQuestion.correct) { correctAnswersCount++; playCorrectSound(); } else { triggerWrongEffects(); }
            for (let i = 0; i < buttons.length; i++) { if (i === currentQuestion.correct) buttons[i].classList.add('correct'); else if (i === selectedIndex) buttons[i].classList.add('wrong'); else buttons[i].classList.add('fade'); }
            document.getElementById('next-btn').style.display = 'inline-block'; autoNextTimeout = setTimeout(nextQuestion, 5000);
        }

        function nextQuestion() {
            clearTimeout(autoNextTimeout); currentQuestionIndex++;
            if (currentQuestionIndex < quizQuestions.length) { showQuestion(); }
            else {
                clearInterval(timerInterval);
                let coinsWon = correctAnswersCount * 10;

                // Spieler-Coins aktualisieren falls Profil vorhanden
                if (playerName !== "Spieler") {
                    currentPlayer.coins = (currentPlayer.coins || 0) + coinsWon;
                    localStorage.setItem("quiz_player_" + playerName.toLowerCase(), JSON.stringify(currentPlayer));
                }

                document.getElementById("quiz-container").style.display = "none";
                document.getElementById("result-screen").style.display = "block";
                document.getElementById("score-correct").innerText = correctAnswersCount;
                document.getElementById("score-wrong").innerText = wrongAnswersCount;
                document.getElementById("won-coins").innerText = coinsWon;

                if (correctAnswersCount > wrongAnswersCount) {
                    playVictorySound();
                    document.getElementById("final-header").innerHTML = `<h2>Super gemacht! 🎉</h2>`;
                    confetti({ particleCount: 150, spread: 80 });
                } else {
                    playGameOverSound();
                    document.getElementById("final-header").innerHTML = `<h2>Das geht besser! 🧐</h2>`;
                }
            }
        }

        window.onload = initQuiz;
    </script>
