<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz-Arena</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>

<body>

    <canvas id="rain-canvas"></canvas>
    <div class="cloud-container" id="clouds">
        <div class="cloud-puff" style="left: -20px; width: 200px; height: 100px;"></div>
        <div class="cloud-puff" style="left: 280px; width: 220px; height: 110px;"></div>
        <div class="cloud-puff" style="left: 580px; width: 250px; height: 120px;"></div>
        <div class="cloud-puff" style="left: 880px; width: 250px; height: 110px;"></div>
    </div>

    <div id="emoji-overlay"></div>

    <div class="container" id="quiz-container">
        <div
            style="display: flex; justify-content: space-between; width: 100%; max-width: 1000px; margin-bottom: 10px;">
            <div id="question-counter" style="font-size: 1.5rem; color: #888;">Frage 1</div>
            <div id="timer-box">⏱️ <span id="timer-count">30</span>s</div>
        </div>
        <div class="question-box" id="question">Lade Frage...</div>
        <div class="grid" id="answer-buttons"></div>
        <button id="next-btn" onclick="nextQuestion()">Nächste Frage ➔</button>
    </div>

    <div class="container" id="result-screen" style="display: none;">
        <div id="final-header"></div>
        <div class="stats-box">
            <div class="stat correct-stat">
                <div style="color: #26890c; font-size: 1.2rem; margin-bottom: 5px;">Richtig</div>
                <span id="score-correct">0</span>
                <div style="font-size: 0.8rem; color: #aaa; margin-top: 5px;">+ <span id="won-coins">0</span> Coins 🪙
                </div>
            </div>
            <div class="stat wrong-stat">
                <div style="color: #e21b3c; font-size: 1.2rem; margin-bottom: 5px;">Falsch</div>
                <span id="score-wrong">0</span>
            </div>
        </div>
        <button id="next-btn" style="display:inline-block; margin-right:10px;"
            onclick="window.location.href='avatar.html'">Avatar anpassen 🎨</button>
        <button id="next-btn" style="display:inline-block;" onclick="window.location.href='menu.html'">Hauptmenü
            🏠</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAy5YkfW99nY3t1CxxrFI5dlqe4w2NZfj4",
            authDomain: "family-quizzz-80c40.firebaseapp.com",
            databaseURL: "https://family-quizzz-80c40-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "family-quizzz-80c40",
            storageBucket: "family-quizzz-80c40.firebasestorage.app",
            messagingSenderId: "30751445599",
            appId: "1:30751445599:web:28636f46555f5df49881ea"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const allQuestions = [
            { category: "sprachen", question: "Was bedeutet der Satz 'Seni seviyorum'?", answers: ["Guten Appetit", "Ich liebe dich", "Wie geht es dir?", "Gute Nacht"], correct: 1 },
            { category: "sprachen", question: "Was bedeutet das Wort 'Baba' auf Türkisch?", answers: ["Opa", "Bruder", "Vater", "Onkel"], correct: 2 },
            { category: "sprachen", question: "Wie bedankt man sich auf Türkisch (Dankeschön)?", answers: ["Merhaba", "Teşekkür ederim", "Lütfen", "Rica ederim"], correct: 1 },
            { category: "sprachen", question: "Was bedeutet 'Lütfen'?", answers: ["Bitte", "Danke", "Tschüss", "Guten Tag"], correct: 0 },
            { category: "sprachen", question: "Was bedeutet 'Günaydın'?", answers: ["Guten Abend", "Gute Nacht", "Guten Morgen", "Mahlzeit"], correct: 2 },
            { category: "sprachen", question: "Was heißt 'Wasser' auf Türkisch?", answers: ["Ekmek", "Su", "Çay", "Süt"], correct: 1 },
            { category: "sprachen", question: "Welches Haustier verbirgt sich hinter 'dog'?", answers: ["Katze", "Maus", "Hund", "Vogel"], correct: 2 },
            { category: "sprachen", question: "Was heißt 'Schule' auf Englisch?", answers: ["Book", "Teacher", "Pencil", "School"], correct: 3 },
            { category: "sprachen", question: "Was bedeutet das englische Wort 'Apple'?", answers: ["Banane", "Apfel", "Erdbeere", "Birne"], correct: 1 },
            { category: "islam", question: "Wer ist der letzte Gesandte und Prophet im Islam?", answers: ["Prophet Ibrahim", "Prophet Isa", "Prophet Musa", "Prophet Muhammad"], correct: 3 },
            { category: "islam", question: "Welcher Prophet baute die Kaaba in Mekka mit seinem Sohn Ismail?", answers: ["Prophet Ibrahim", "Prophet Nuh", "Prophet Yusuf", "Prophet Yunus"], correct: 0 },
            { category: "islam", question: "Welcher Prophet konnte durch Allahs Erlaubnis das Rote Meer teilen?", answers: ["Prophet Isa", "Prophet Musa", "Prophet Dawud", "Prophet Adam"], correct: 1 },
            { category: "islam", question: "Wie heißt das heilige Buch im Islam?", answers: ["Tora", "Evangelium", "Koran (Qur'an)", "Psalmen"], correct: 2 },
            { category: "islam", question: "In welchem Monat fasten Muslime weltweit?", answers: ["Schawwal", "Ramadan", "Muharram", "Dhu l-Hiddscha"], correct: 1 },
            { category: "islam", question: "Wie viele Pflichtgebete verrichtet ein Muslim am Tag?", answers: ["3 Gebete", "4 Gebete", "5 Gebete", "6 Gebete"], correct: 2 },
            { category: "hauptstaedte", question: "Wie heißt die Landeshauptstadt von Nordrhein-Westfalen?", answers: ["Köln", "Dortmund", "Düsseldorf", "Essen"], correct: 2 },
            { category: "hauptstaedte", question: "Welche Stadt ist die Hauptstadt von Bayern?", answers: ["Nürnberg", "München", "Augsburg", "Regensburg"], correct: 1 },
            { category: "hauptstaedte", question: "Wie heißt die Landeshauptstadt von Niedersachsen?", answers: ["Bremen", "Hamburg", "Hannover", "Kiel"], correct: 2 },
            { category: "hauptstaedte", question: "Welche Stadt ist die Hauptstadt von ganz Deutschland?", answers: ["München", "Hamburg", "Frankfurt", "Berlin"], correct: 3 },
            { category: "filme", question: "Herr der Ringe: Wie heißt das kleine Volk, zu dem Frodo und Sam gehören?", answers: ["Elben", "Zwerge", "Zauberer", "Hobbits"], correct: 3 },
            { category: "filme", question: "Welche gelben, kleinen Kreaturen lieben Bananen?", answers: ["Schlümpfe", "Minions", "Pokémon", "Trolle"], correct: 1 },
            { category: "filme", question: "Aus welchem Disney-Film stammt die Eiskönigin Elsa?", answers: ["Die Eiskönigin", "Rapunzel", "Vaiana", "König der Löwen"], correct: 0 },
            { category: "buecher", question: "Pippi Langstrumpf: Wie heißt Pippis gepunktetes Pferd?", answers: ["Herr Nilsson", "Kleiner Onkel", "Blitz", "Rappe"], correct: 1 },
            { category: "buecher", question: "Wie heißt das Holz-Männchen, dessen Nase beim Lügen wächst?", answers: ["Pinocchio", "Peter Pan", "Mowgli", "Tom Sawyer"], correct: 0 },
            { category: "klasse2", question: "Rechne aus: Was ergibt 12 + 7?", answers: ["15", "18", "19", "20"], correct: 2 },
            { category: "klasse2", question: "Deutsch: Welches Wort reimt sich perfekt auf das Wort 'Maus'?", answers: ["Brot", "Haus", "Katze", "Milch"], correct: 1 },
            { category: "klasse2", question: "Rechne aus: Was ist 20 - 6?", answers: ["12", "13", "14", "15"], correct: 2 },
            { category: "klasse2", question: "Englisch: Welches Tier ist eine englische 'cat'?", answers: ["Ein Hund", "Ein Vogel", "Eine Katze", "Ein Pferd"], correct: 2 },
            { category: "klasse2", question: "Sachkunde: Welches stachelige Tier hält im Winter einen langen Winterschlaf?", answers: ["Eichhörnchen", "Igel", "Hase", "Amsel"], correct: 1 },
            { category: "klasse4", question: "Deutsch: Welches Wort ist ein Nomen (Substantiv)?", answers: ["schnell", "laufen", "Der Baum", "schön"], correct: 2 },
            { category: "klasse4", question: "Mathe: Was ergibt 120 x 3?", answers: ["320", "360", "400", "420"], correct: 1 },
            { category: "klasse4", question: "Sachkunde: Welcher Fluss fließt durch Köln und Düsseldorf?", answers: ["Donau", "Elbe", "Rhein", "Weser"], correct: 2 },
            { category: "klasse4", question: "Sachkunde: In welchem Bundesland liegen Kamp-Lintfort und Köln?", answers: ["Bayern", "Hessen", "Nordrhein-Westfalen", "Niedersachsen"], correct: 2 },
            { category: "kfz", question: "LF 1: Welche Aufgabe hat die Motorkühlung hauptsächlich?", answers: ["Den Motor auf Betriebstemperatur halten", "Kältemittel herstellen", "Abgasstrom drosseln", "Lichtmaschine antreiben"], correct: 0 },
            { category: "kfz", question: "LF 2: Welches Prüfmittel eignet sich zum Messen von Ventilspiel?", answers: ["Fühlerlehre", "Messschieber", "Bügelmessschraube", "Messuhr"], correct: 0 },
            { category: "kfz", question: "LF 3: Wie verhalten sich die Stromstärke in einer Reihenschaltung von Widerständen?", answers: ["Die Stromstärke ist überall gleich groß", "Die Spannung ist überall gleich", "Der Gesamtwiderstand sinkt", "Die Leistung verdoppelt sich"], correct: 0 },
            { category: "politik", question: "Wie heißt das wichtigste Gesetzbuch in Deutschland?", answers: ["Das Regelbuch", "Das Grundgesetz", "Das Schulgesetz", "Das Strafbuch"], correct: 1 },
            { category: "politik", question: "In welcher deutschen Stadt treffen sich die Politiker im Bundestag?", answers: ["München", "Köln", "Berlin", "Frankfurt"], correct: 2 },
            { category: "politik", question: "Wer wählt in einer Demokratie wie Deutschland die Politiker?", answers: ["Die Königin", "Das Volk (die Bürger)", "Die Lehrer", "Die Polizei"], correct: 1 },
            { category: "fussball", question: "Wie viele Spieler von einer Mannschaft stehen beim Anpfiff gleichzeitig auf dem Feld?", answers: ["9 Spieler", "10 Spieler", "11 Spieler", "12 Spieler"], correct: 2 },
            { category: "fussball", question: "Was zeigt der Schiedsrichter bei einem sehr schweren Foulspiel?", answers: ["Die Grüne Karte", "Die Gelbe Karte", "Die Rote Karte", "Die Blaue Karte"], correct: 2 },
            { category: "mode", question: "Aus welchem beliebten, festen blauen Stoff werden Jeanshosen gemacht?", answers: ["Seide", "Denim (Baumwolle)", "Wolle", "Leder"], correct: 1 },
            { category: "erdkunde", question: "Welcher ist der größte Ozean (Weltmeer) auf unserer Erde?", answers: ["Der Atlantische Ozean", "Der Pazifische Ozean", "Der Indische Ozean", "Die Nordsee"], correct: 1 }
        ];

        let playerName = sessionStorage.getItem("current_quiz_player") || "Spieler";
        let settings = JSON.parse(sessionStorage.getItem("quiz_settings")) || { categories: ["sprachen"], count: 5, timer: 30, speech: true };

        let quizQuestions = []; let currentQuestionIndex = 0; let answered = false;
        let correctAnswersCount = 0; let wrongAnswersCount = 0;
        let timerInterval; let autoNextTimeout; let timeLeft = 30;
        let audioCtx;

        function initAudio() {
            if (!audioCtx) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
            if (audioCtx.state === 'suspended') { audioCtx.resume(); }
        }

        function playTone(freq, type, duration, startTimeOffset = 0) {
            initAudio();
            setTimeout(() => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type; osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.6, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + duration);
            }, startTimeOffset);
        }

        function playTickSound() { playTone(800, 'triangle', 0.03, 0); }
        function playCorrectSound() { playTone(523.25, 'sine', 0.1, 0); playTone(659.25, 'sine', 0.15, 80); }
        function playRararaSound() { let now = 0; for (let i = 0; i < 9; i++) { playTone(180 - (i * 5), 'sawtooth', 0.06, now); now += 70; } }
        function playVictorySound() { playTone(523.25, 'sine', 0.12, 0); playTone(659.25, 'sine', 0.12, 120); playTone(783.99, 'sine', 0.12, 240); playTone(1046.50, 'sine', 0.4, 360); }
        function playGameOverSound() { playTone(220.00, 'triangle', 0.2, 0); playTone(207.65, 'triangle', 0.2, 200); playTone(196.00, 'triangle', 0.4, 400); }

        function readQuestionAloud(questionText) {
            window.speechSynthesis.cancel();
            if (!settings.speech) return;
            let utterance = new SpeechSynthesisUtterance(questionText);
            utterance.lang = 'de-DE';
            utterance.rate = 0.95;
            window.speechSynthesis.speak(utterance);
        }

        const canvas = document.getElementById('rain-canvas'); const ctx = canvas.getContext('2d');
        let rainDrops = []; let rainAnimation;
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas); resizeCanvas();
        function createRain() { rainDrops = []; for (let i = 0; i < 100; i++) { rainDrops.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height - canvas.height, length: Math.random() * 20 + 10, speed: Math.random() * 15 + 10 }); } }
        function drawRain() { ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.strokeStyle = 'rgba(174, 194, 224, 0.5)'; ctx.lineWidth = 2; ctx.lineCap = 'round'; rainDrops.forEach(drop => { ctx.beginPath(); ctx.moveTo(drop.x, drop.y); ctx.lineTo(drop.x, drop.y + drop.length); ctx.stroke(); drop.y += drop.speed; if (drop.y > canvas.height) { drop.y = -drop.length; drop.x = Math.random() * canvas.width; } }); rainAnimation = requestAnimationFrame(() => drawRain()); }
        function startRain() { document.getElementById('rain-canvas').style.display = 'block'; createRain(); drawRain(); }
        function stopRain() { document.getElementById('rain-canvas').style.display = 'none'; cancelAnimationFrame(rainAnimation); }

        function initQuiz() {
            let filtered = allQuestions.filter(q => settings.categories && settings.categories.includes(q.category));
            if (filtered.length === 0) { filtered = allQuestions; }
            let shuffled = filtered.sort(() => 0.5 - Math.random());
            let questionLimit = settings.count || 5;
            quizQuestions = shuffled.slice(0, Math.min(questionLimit, shuffled.length));
            showQuestion();
        }

        function clearStorm() { document.body.classList.remove('stormy'); document.getElementById('clouds').classList.remove('show'); stopRain(); }

        function showQuestion() {
            answered = false; document.getElementById('next-btn').style.display = 'none'; clearStorm(); clearTimeout(autoNextTimeout);
            document.getElementById('question-counter').innerText = `Frage ${currentQuestionIndex + 1} von ${quizQuestions.length}`;
            let currentQuestion = quizQuestions[currentQuestionIndex];
            document.getElementById('question').innerText = currentQuestion.question;
            const btnBox = document.getElementById('answer-buttons'); btnBox.innerHTML = '';
            currentQuestion.answers.forEach((answer, index) => {
                const button = document.createElement('button'); button.innerText = answer; button.classList.add('btn', `btn-${index}`);
                button.addEventListener('click', () => selectAnswer(index)); btnBox.appendChild(button);
            });
            readQuestionAloud(currentQuestion.question);
            startTimer();
        }

        function startTimer() {
            clearInterval(timerInterval);
            timeLeft = settings.timer || 30;
            document.getElementById('timer-count').innerText = timeLeft;
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer-count').innerText = timeLeft;
                if (timeLeft <= 5 && timeLeft > 0) { playTickSound(); }
                if (timeLeft <= 0) { clearInterval(timerInterval); timeOut(); }
            }, 1000);
        }

        function triggerWrongEffects() { window.speechSynthesis.cancel(); playRararaSound(); document.body.classList.add('stormy'); document.getElementById('clouds').classList.add('show'); startRain(); }

        function timeOut() {
            if (answered) return; answered = true; wrongAnswersCount++; triggerWrongEffects();
            const currentQuestion = quizQuestions[currentQuestionIndex]; const buttons = document.getElementsByClassName('btn');
            for (let i = 0; i < buttons.length; i++) { if (i === currentQuestion.correct) buttons[i].classList.add('correct'); else buttons[i].classList.add('fade'); }
            document.getElementById('next-btn').style.display = 'inline-block'; autoNextTimeout = setTimeout(nextQuestion, 5000);
        }

        function selectAnswer(selectedIndex) {
            if (answered) return; answered = true; clearInterval(timerInterval); window.speechSynthesis.cancel();
            const currentQuestion = quizQuestions[currentQuestionIndex]; const buttons = document.getElementsByClassName('btn');
            if (selectedIndex === currentQuestion.correct) { correctAnswersCount++; playCorrectSound(); } else { triggerWrongEffects(); }
            for (let i = 0; i < buttons.length; i++) { if (i === currentQuestion.correct) buttons[i].classList.add('correct'); else if (i === selectedIndex) buttons[i].classList.add('wrong'); else buttons[i].classList.add('fade'); }
            document.getElementById('next-btn').style.display = 'inline-block'; autoNextTimeout = setTimeout(nextQuestion, 5000);
        }

        function nextQuestion() {
            window.speechSynthesis.cancel();
            clearTimeout(autoNextTimeout); currentQuestionIndex++;
            if (currentQuestionIndex < quizQuestions.length) { showQuestion(); }
            else {
                clearInterval(timerInterval);
                let coinsWon = correctAnswersCount * 10;

                if (playerName !== "Spieler") {
                    // Live-Update in der Online-Datenbank über Transaktion (schützt vor Fehlern)
                    db.ref("players/" + playerName.toLowerCase()).transaction((player) => {
                        if (player) {
                            player.coins = (player.coins || 0) + coinsWon;
                        }
                        return player;
                    }, () => {
                        // Nach erfolgreichem Speichern Resultate anzeigen
                        showResults(coinsWon);
                    });
                } else {
                    showResults(coinsWon);
                }
            }
        }

        function showResults(coinsWon) {
            document.getElementById("quiz-container").style.display = "none";
            document.getElementById("result-screen").style.display = "block";
            document.getElementById("score-correct").innerText = correctAnswersCount;
            document.getElementById("score-wrong").innerText = wrongAnswersCount;
            document.getElementById("won-coins").innerText = coinsWon;

            if (correctAnswersCount > wrongAnswersCount) {
                playVictorySound();
                document.getElementById("final-header").innerHTML = `<h2>Super gemacht! 🎉</h2>`;
                confetti({ particleCount: 150, spread: 80 });
            } else {
                playGameOverSound();
                document.getElementById("final-header").innerHTML = `<h2>Das geht besser! 🧐</h2>`;
            }
        }

        window.onload = initQuiz;
    </script>
</body>

</html>
