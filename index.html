<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Özdemir Familien-Quiz - Login</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        .profile-container {
            margin-bottom: 20px;
            background-color: #16213e;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
        }

        .profile-grid {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        .profile-card {
            background-color: #1a1a2e;
            border: 3px solid #1368ce;
            border-radius: 12px;
            padding: 12px;
            width: 95px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
            position: relative;
        }

        .profile-card:hover {
            transform: scale(1.05);
            border-color: #ff6b81;
        }

        .profile-avatar-wrapper {
            position: relative;
            width: 65px;
            height: 95px;
            background-color: #16213e;
            border-radius: 10px;
            margin: 0 auto 8px auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 2px solid #e94560;
            overflow: visible;
        }

        .profile-name {
            font-weight: bold;
            font-size: 1rem;
            color: white;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .profile-coins {
            font-size: 0.8rem;
            color: #ffd700;
            margin-top: 3px;
        }

        .divider {
            margin: 20px 0;
            color: #555;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #333;
            margin: 0 15px;
        }
    </style>
</head>

<body>

    <div class="container" id="login-screen">
        <h1 class="main-title">Özdemir Familien-Quiz 🎮</h1>

        <div class="profile-container" id="existing-profiles-box" style="display: none;">
            <div class="setup-title" style="margin-bottom: 5px;">Wer spielt heute? 👤</div>
            <p style="color: #aaa; font-size: 0.85rem; margin-bottom: 15px;">Tippe auf dein Profil, um direkt
                loszulegen!</p>
            <div class="profile-grid" id="profile-grid"></div>
        </div>

        <div class="divider" id="profile-divider" style="display: none;">ODER</div>

        <div class="setup-section">
            <div class="setup-title" id="new-player-title">Neuen Spieler anmelden ✍️</div>
            <p style="color: #aaa; font-size: 0.85rem; margin-bottom: 15px;">Gib deinen Namen ein, um ein neues Profil
                zu erstellen.</p>
            <input type="text" id="username-input" placeholder="Dein Name..." autocomplete="off">
            <button id="login-btn" onclick="handleLogin()">Anmelden & Weiter 🚀</button>
        </div>

        <div class="qr-box" id="qr-box">
            <div style="font-size: 1rem; font-weight: bold; margin-bottom: 5px; color: #ff6b81;">Auf dem Handy spielen?
                📱</div>
            <p style="font-size: 0.8rem; color: #aaa; margin: 0 0 10px 0;">Scanne den Code mit der Handykamera!</p>
            <div class="qr-code-wrapper">
                <img id="qr-code-img" src="" alt="Lade QR-Code...">
            </div>
        </div>
    </div>

    <script>
        // Deine Konfiguration
        const firebaseConfig = {
            apiKey: "AIzaSyAy5YkfW99nY3t1CxxrFI5dlqe4w2NZfj4",
            authDomain: "family-quizzz-80c40.firebaseapp.com",
            databaseURL: "https://family-quizzz-80c40-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "family-quizzz-80c40",
            storageBucket: "family-quizzz-80c40.firebasestorage.app",
            messagingSenderId: "30751445599",
            appId: "1:30751445599:web:28636f46555f5df49881ea"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let audioCtx;

        function initAudio() {
            if (!audioCtx) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
            if (audioCtx.state === 'suspended') { audioCtx.resume(); }
        }

        function playTone(freq, type, duration) {
            initAudio();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type; osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.6, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }

        // Lädt Profile live aus dem Internet
        function listenToProfiles() {
            db.ref("players").on("value", (snapshot) => {
                const players = snapshot.val();
                const grid = document.getElementById("profile-grid");
                grid.innerHTML = "";

                if (players) {
                    document.getElementById("existing-profiles-box").style.display = "block";
                    document.getElementById("profile-divider").style.display = "flex";
                    document.getElementById("new-player-title").innerText = "Neues Profil erstellen 👤";

                    Object.keys(players).forEach(key => {
                        const playerData = players[key];
                        const card = document.createElement("div");
                        card.className = "profile-card";
                        card.onclick = () => loginAs(playerData.name);

                        card.innerHTML = `
                        <div class="profile-avatar-wrapper">
                            <span style="font-size: 2.2rem; z-index: 2; margin-top:-5px;">${playerData.avatar.base}</span>
                            <span style="font-size: 1.2rem; margin-top: -12px; z-index: 1;">👕</span>
                            <span style="font-size: 1.2rem; margin-top: -8px; z-index: 1;">👖</span>
                            <span style="position:absolute; top:-12px; left:0; width:100%; text-align:center; font-size:1.8rem; z-index: 4;">${playerData.avatar.hat || ''}</span>
                            <span style="position:absolute; top:2px; left:0; width:100%; text-align:center; font-size:1.1rem; z-index: 3;">${playerData.avatar.glasses || ''}</span>
                        </div>
                        <div class="profile-name">${playerData.name}</div>
                        <div class="profile-coins">🪙 ${playerData.coins}</div>
                    `;
                        grid.appendChild(card);
                    });
                }
            });
        }

        function loginAs(name) {
            try { playTone(523, 'sine', 0.1); } catch (e) { }
            sessionStorage.setItem("current_quiz_player", name);
            setTimeout(() => { window.location.href = "menu.html"; }, 150);
        }

        function handleLogin() {
            const input = document.getElementById("username-input");
            const name = input.value.trim();
            if (!name) { alert("Bitte gib deinen Namen ein!"); return; }

            try { playTone(440, 'sine', 0.1); } catch (e) { }
            sessionStorage.setItem("current_quiz_player", name);
            let nameKey = name.toLowerCase();

            // Prüfen, ob der Spieler bereits in Firebase existiert
            db.ref("players/" + nameKey).once("value", (snapshot) => {
                if (!snapshot.exists()) {
                    // Neu anlegen in Firebase
                    let newPlayer = {
                        name: name,
                        coins: 0,
                        avatar: { base: "🧑", hat: "", glasses: "" },
                        unlockedHats: ["cap"],
                        unlockedGlasses: ["nerd"]
                    };
                    db.ref("players/" + nameKey).set(newPlayer, () => {
                        window.location.href = "avatar.html";
                    });
                } else {
                    window.location.href = "menu.html";
                }
            });
        }

        window.onload = function () {
            listenToProfiles();
            const qrImg = document.getElementById("qr-code-img");
            if (qrImg) {
                const currentUrl = encodeURIComponent(window.location.href);
                qrImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${currentUrl}&color=1a1a2e&bgcolor=ffffff`;
            }
        }
    </script>
</body>

</html>
