<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avatar Studio - Vektor Edition</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 15px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            text-align: center;
        }

        /* Premium Avatar Vorschau-Box */
        .avatar-display-card {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border: 3px solid #3b82f6;
            border-radius: 24px;
            padding: 30px 20px;
            margin-bottom: 20px;
            position: relative;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
        }

        /* Pixelgenaues Layering für echte Vektor-Grafiken (SVGs) */
        .avatar-viewport {
            width: 150px;
            height: 150px;
            margin: 0 auto;
            position: relative;
            background: #1e3a8a;
            border-radius: 20px;
            box-shadow: inset 0 4px 10px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        .avatar-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none;
            /* Klicks gehen durch das Bild durch */
        }

        .layer-base {
            z-index: 1;
        }

        .layer-glasses {
            z-index: 2;
        }

        .layer-hat {
            z-index: 3;
        }

        .coin-status {
            font-size: 1.3rem;
            color: #fbbf24;
            font-weight: bold;
            margin-top: 10px;
        }

        /* Shop Layout */
        .shop-section-title {
            text-align: left;
            font-size: 1.1rem;
            color: #3b82f6;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 20px 0 10px 0;
            font-weight: bold;
            border-bottom: 2px solid #334155;
            padding-bottom: 4px;
        }

        .shop-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 10px;
            margin-bottom: 15px;
        }

        /* Item Karten */
        .item-card {
            background: #1e293b;
            border: 2px solid #475569;
            border-radius: 16px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
        }

        .item-card:hover {
            transform: translateY(-2px);
            border-color: #3b82f6;
        }

        .item-preview-img {
            width: 60px;
            height: 60px;
            object-fit: contain;
            margin-bottom: 8px;
        }

        .item-label {
            font-size: 0.9rem;
            font-weight: bold;
            color: #f1f5f9;
        }

        /* Button Tags */
        .status-tag {
            width: 100%;
            border-radius: 8px;
            padding: 6px 0;
            font-size: 0.8rem;
            font-weight: bold;
            margin-top: 8px;
            text-align: center;
            box-sizing: border-box;
        }

        .status-buy {
            background: #334155;
            color: #fbbf24;
            border: 1px solid #fbbf24;
        }

        .status-equip {
            background: #1e3a8a;
            color: #60a5fa;
        }

        .status-active {
            background: #16a34a;
            color: white;
            box-shadow: 0 0 10px rgba(22, 163, 74, 0.4);
        }

        .status-epic {
            background: #581c87;
            color: #d8b4fe;
            border: 1px solid #a855f7;
        }

        .back-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            margin-top: 25px;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.2);
        }
    </style>
</head>

<body>

    <div class="container">
        <h2 style="color: #60a5fa; margin-top: 10px; margin-bottom: 15px;">Vektor Avatar Studio 🎨</h2>

        <!-- AVATAR LIVE VORSCHAU (ECHTE BILDER ÜBEREINANDER) -->
        <div class="avatar-display-card">
            <div class="avatar-viewport">
                <img id="p-base" class="avatar-layer layer-base" src="bilder/avatar/basis.svg" alt="Basis">
                <img id="p-glasses" class="avatar-layer layer-glasses" src="" style="display:none;">
                <img id="p-hat" class="avatar-layer layer-hat" src="" style="display:none;">
            </div>
            <div class="coin-status">🪙 Deine Coins: <span id="shop-coins">0</span></div>
        </div>

        <!-- HÜTE BEREICH -->
        <div class="shop-section-title">🎩 Hüte & Kronen</div>
        <div id="hats-grid" class="shop-grid"></div>

        <!-- BRILLEN BEREICH -->
        <div class="shop-section-title">🕶️ Brillen & Masken</div>
        <div id="glasses-grid" class="shop-grid"></div>

        <button onclick="window.location.href='menu.html'" class="back-btn">Zurück zum Hauptmenü 🔙</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAy5YkfW99nY3t1CxxrFI5dlqe4w2NZfj4",
            authDomain: "family-quizzz-80c40.firebaseapp.com",
            databaseURL: "https://family-quizzz-80c40-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "family-quizzz-80c40",
            storageBucket: "family-quizzz-80c40.firebasestorage.app",
            messagingSenderId: "30751445599",
            appId: "1:30751445599:web:28636f46555f5df49881ea"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let playerName = sessionStorage.getItem("current_quiz_player");
        let currentPlayer = null;

        // SHOP ITEMS MIT PFADEN ZU DEINEN SVG-VEKTOR-DATEIEN
        const shopHats = [
            { id: "none_hat", label: "Kein Hut", price: 0, file: "", rarity: "common" },
            { id: "cap", label: "Basecap", price: 25, file: "bilder/avatar/huete/cap.svg", rarity: "common" },
            { id: "cowboy", label: "Cowboyhut", price: 60, file: "bilder/avatar/huete/cowboy.svg", rarity: "rare" },
            { id: "helmet", label: "KFZ-Helm", price: 80, file: "bilder/avatar/huete/helmet.svg", rarity: "rare" },
            { id: "wizard", label: "Magierhut", price: 120, file: "bilder/avatar/huete/wizard.svg", rarity: "rare" },
            { id: "crown", label: "Goldene Krone", price: 200, file: "bilder/avatar/huete/crown.svg", rarity: "rare" },
            { id: "halo", label: "Heiligenschein", price: "epic", file: "bilder/avatar/huete/halo.svg", rarity: "epic" },
            { id: "ninja", label: "Ninja-Band", price: "epic", file: "bilder/avatar/huete/ninja.svg", rarity: "epic" }
        ];

        const shopGlasses = [
            { id: "none_glasses", label: "Keine Brille", price: 0, file: "", rarity: "common" },
            { id: "nerd", label: "Nerdbrille", price: 20, file: "bilder/avatar/brillen/nerd.svg", rarity: "common" },
            { id: "sun", label: "Sonnenbrille", price: 45, file: "bilder/avatar/brillen/sun.svg", rarity: "common" },
            { id: "heart", label: "Herzbrille", price: 90, file: "bilder/avatar/brillen/heart.svg", rarity: "rare" },
            { id: "laser", label: "Laser-Visier", price: "epic", file: "bilder/avatar/brillen/laser.svg", rarity: "epic" },
            { id: "pirate", label: "Augenklappe", price: "epic", file: "bilder/avatar/brillen/pirate.svg", rarity: "epic" }
        ];

        db.ref("players/" + (playerName ? playerName.toLowerCase() : "")).on("value", (snapshot) => {
            currentPlayer = snapshot.val();
            if (currentPlayer) {
                if (!currentPlayer.unlockedHats) currentPlayer.unlockedHats = ["none_hat"];
                if (!currentPlayer.unlockedGlasses) currentPlayer.unlockedGlasses = ["none_glasses"];

                document.getElementById("shop-coins").innerText = currentPlayer.coins || 0;
                updatePreview();
                renderShopUI();
            }
        });

        function updatePreview() {
            let hatFile = currentPlayer.avatar ? currentPlayer.avatar.hat || "" : "";
            let glassesFile = currentPlayer.avatar ? currentPlayer.avatar.glasses || "" : "";

            let hatImg = document.getElementById("p-hat");
            if (hatFile !== "") { hatImg.src = hatFile; hatImg.style.display = "block"; }
            else { hatImg.style.display = "none"; }

            let glassesImg = document.getElementById("p-glasses");
            if (glassesFile !== "") { glassesImg.src = glassesFile; glassesImg.style.display = "block"; }
            else { glassesImg.style.display = "none"; }
        }

        function renderShopUI() {
            renderGrid("hats-grid", shopHats, 'hat', currentPlayer.unlockedHats);
            renderGrid("glasses-grid", shopGlasses, 'glasses', currentPlayer.unlockedGlasses);
        }

        function renderGrid(containerId, itemsList, itemType, unlockedCollection) {
            const grid = document.getElementById(containerId);
            grid.innerHTML = "";

            itemsList.forEach(item => {
                const card = document.createElement("div");
                card.className = "item-card";

                let currentEquipped = currentPlayer.avatar ? currentPlayer.avatar[itemType] || "" : "";
                let isCurrentlyEquipped = (currentEquipped === item.file && item.id !== "none_hat" && item.id !== "none_glasses") ||
                    (item.id === "none_hat" && currentEquipped === "") ||
                    (item.id === "none_glasses" && currentEquipped === "");

                let isUnlocked = unlockedCollection.includes(item.id);

                let statusBtnHtml = "";
                if (isCurrentlyEquipped) {
                    statusBtnHtml = `<div class="status-tag status-active">Aktiviert ✅</div>`;
                } else if (isUnlocked) {
                    statusBtnHtml = `<div class="status-tag status-equip">Ausrüsten 🔄</div>`;
                } else if (item.price === "epic") {
                    statusBtnHtml = `<div class="status-tag status-epic">✨ Kiste ✨</div>`;
                } else {
                    statusBtnHtml = `<div class="status-tag status-buy">🪙 ${item.price}</div>`;
                }

                // Fallback falls die SVG-Datei noch nicht im Ordner liegt, wird ein Platzhalter-Emoji gezeigt
                let previewElement = item.file !== "" ?
                    `<img class="item-preview-img" src="${item.file}" onerror="this.onerror=null; this.src='https://placehold.co/100x100/1e293b/white?text=SVG';">` :
                    `<div style='font-size:2.5rem; margin-bottom:8px;'>❌</div>`;

                card.innerHTML = `
                ${previewElement}
                <div class="item-label">${item.label}</div>
                ${statusBtnHtml}
            `;

                card.onclick = () => {
                    if (isUnlocked) {
                        equip(itemType, item.file);
                    } else if (item.price === "epic") {
                        alert("Dieses epische Item gibt es nur aus den Lernschatzkisten! 🎁");
                    } else {
                        buy(itemType, item);
                    }
                };

                grid.appendChild(card);
            });
        }

        function buy(type, item) {
            if ((currentPlayer.coins || 0) >= item.price) {
                currentPlayer.coins -= item.price;
                if (type === 'hat') { currentPlayer.unlockedHats.push(item.id); }
                else { currentPlayer.unlockedGlasses.push(item.id); }

                if (!currentPlayer.avatar) currentPlayer.avatar = { base: "bilder/avatar/basis.svg", hat: "", glasses: "" };
                currentPlayer.avatar[type] = item.file;

                db.ref("players/" + playerName.toLowerCase()).set(currentPlayer, () => {
                    confetti({ particleCount: 30, spread: 40 });
                });
            } else {
                alert("Nicht genug Coins! 🪙");
            }
        }

        function equip(type, file) {
            if (!currentPlayer.avatar) currentPlayer.avatar = { base: "bilder/avatar/basis.svg", hat: "", glasses: "" };
            currentPlayer.avatar[type] = file;
            db.ref("players/" + playerName.toLowerCase()).set(currentPlayer);
        }
    </script>
</body>

</html>
