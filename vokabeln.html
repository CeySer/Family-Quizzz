            width: 100%;

            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
            box-sizing: border-box;
        }

        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .nav-btn {
            background: #475569;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.95rem;
            transition: background 0.2s;
        }

        .nav-btn:hover {
            background: #64748b;
        }

        .coin-display {
            font-size: 1.25rem;
            color: #fbbf24;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .tab-group {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            background: #334155;
            color: #94a3b8;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.95rem;
        }

        .tab-btn.active {
            background: #3b82f6;
            color: white;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
        }

            display: block;
            text-align: left;
            margin-bottom: 6px;
            font-weight: bold;
            text-transform: uppercase;

        .category-dropdown {
            width: 100%;

            background: #334155;
            border: 2px solid #475569;
            color: white;
            border-radius: 12px;
            font-size: 1.05rem;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
            outline: none;
        }

        /* */
        /* 3D Karteikarten-Effekt */
        .flip-card {
            background-color: transparent;
            width: 100%;
            height: 220px;
            perspective: 1000px;
            margin: 15px 0;
        }

        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            cursor: pointer;
        }

        .flip-card.flipped .flip-card-inner {
            transform: rotateY(180deg);
        }

        .flip-card-front,
        .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            border-radius: 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
            box-sizing: border-box;
        }

        .flip-card-front {
            background-color: #1e3a8a;
            color: white;
            border: 3px solid #3b82f6;
        }

        .flip-card-back {
            background-color: #31102f;
            color: white;
            border: 3px solid #ec4899;
            transform: rotateY(180deg);
        }

        .word-title {
            font-size: 2.2rem;
            font-weight: bold;
            margin: 10px 0;
            word-wrap: break-word;
            max-width: 100%;
        }

            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: bold;

            color: white;
            border: 2px solid #475569;
            padding: 14px;
            border-radius: 12px;
            font-size: 1.1rem;
            cursor: pointer;
            width: 100%;
            margin-bottom: 10px;
            text-align: left;
            transition: all 0.2s;
        }

        .quiz-option:hover {
            background: #475569;
        }

        .quiz-option.correct {
            background: #16a34a !important;
            border-color: #22c55e !important;
        }

        .quiz-option.wrong {
            background: #dc2626 !important;

                },
                food: {
                    label: "🍎 Yiyecek ve İçecekler (Essen & Trinken)",
                    words: [
                        { de: "Tomate", foreign: "domates" }, { de: "Erbsen", foreign: "bezelye" }, { de: "Kartoffel", foreign: "patates" },
                        { de: "Gurke", foreign: "salatalık" }, { de: "Zwiebel", foreign: "soğan" }, { de: "Karotte", foreign: "havuç" },
                        { de: "Pflaume", foreign: "erik" }, { de: "Erdbeere", foreign: "çilek" }, { de: "Wassermelone", foreign: "karpuz" },
                        { de: "Pfirsich", foreign: "şeftali" }, { de: "Birne", foreign: "armut" }, { de: "Ananas", foreign: "ananas" },
                        { de: "Weintrauben", foreign: "üzüm" }, { de: "Zitrone", foreign: "limon" }, { de: "Orange", foreign: "portakal" },
                        { de: "Apfel", foreign: "elma" }, { de: "Banane", foreign: "muz" }, { de: "Kirsche", foreign: "kiraz" },
                        { de: "Kaffee", foreign: "kahve" }, { de: "Süt (Milch)", foreign: "süt" }, { de: "Wasser", foreign: "su" },
                        { de: "Tee", foreign: "çay" }, { de: "Pizza", foreign: "pizza" }, { de: "Brot", foreign: "ekmek" },
                        { de: "Käse", foreign: "peynir" }, { de: "Ei", foreign: "yumurta" }
                    ]
                },
                family: {
                    label: "👨‍👩‍👧 Ailem (Familie)",
                    words: [
                        { de: "Büyükanne ve büyükbaba", foreign: "büyükanne ve büyükbaba" }, { de: "Oma", foreign: "büyükanne" },
                        { de: "Opa", foreign: "büyükbaba" }, { de: "Eltern", foreign: "anne ve baba" }, { de: "Mutter", foreign: "anne" },
                        { de: "Vater", foreign: "baba" }, { de: "Erkek kardeş", foreign: "erkek kardeş" },
                        { de: "Schwester", foreign: "kız kardeş" }, { de: "Kind", foreign: "çocuk" }
                    ]
                },
                christmas: {
                    label: "🎄 Noel (Weihnachten)",
                    words: [
                        { de: "Geschenk", foreign: "hediye" }, { de: "Kerze", foreign: "mum" }, { de: "Zil (Glocke)", foreign: "zil" },
                        { de: "Rentier", foreign: "ren geyiği" }, { de: "Schlitten", foreign: "kızak" },
                        { de: "Lichter", foreign: "ışıklar" }, { de: "Kekse", foreign: "kurabiyeler" }
                    ]
                }
            }
        };

        let activeLang = 'en';
        let activeCategory = 'numbers';
        let activeMode = 'cards';
        let currentIndex = 0;
        let quizOptions = [];

        db.ref("players/" + (playerName ? playerName.toLowerCase() : "")).on("value", (snapshot) => {
            currentPlayer = snapshot.val();
            if (currentPlayer) {
                document.getElementById("user-coins").innerText = currentPlayer.coins || 0;
            }
        });

        // Füllt die Themen-Box basierend auf der Sprache
        function populateCategories() {
            const dropdown = document.getElementById("category-dropdown");
            dropdown.innerHTML = "";

            const categories = vocabData[activeLang];
            Object.keys(categories).forEach(key => {
                const option = document.createElement("option");
                option.value = key;
                option.innerText = categories[key].label;
                if (key === activeCategory) option.selected = true;
                dropdown.appendChild(option);
            });
        }

        function setLanguage(lang) {
            activeLang = lang;
            document.querySelectorAll('#lang-selector .tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            populateCategories();
            currentIndex = 0;
            loadVocab();
        }

        function selectCategory(cat) {
            activeCategory = cat;
            currentIndex = 0;
            loadVocab();
        }

        function setMode(mode) {
            activeMode = mode;
            document.querySelectorAll('#mode-selector .tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            loadVocab();
        }

        function loadVocab() {
            const activeCatData = vocabData[activeLang][activeCategory];
            const vocabList = activeCatData ? activeCatData.words : [];

            document.getElementById("total-display").innerText = vocabList.length;
            document.getElementById("current-index-display").innerText = vocabList.length > 0 ? currentIndex + 1 : 0;

            const box = document.getElementById("vokabel-box");
            box.innerHTML = "";

            if (vocabList.length === 0) {
                box.innerHTML = "<p style='color: #ef4444; font-weight: bold;'>Keine Vokabeln in dieser Kategorie vorhanden.</p>";
                return;
            }

            const currentItem = vocabList[currentIndex];

            if (activeMode === 'cards') {
                // KARTEIKARTEN-MODUS MIT 3D FLIP & SPRACHAUSGABE
                const cardHtml = `
                <div class="flip-card" id="main-card" onclick="flipCard()">
                    <div class="flip-card-inner">
                        <div class="flip-card-front">
                            <span class="word-subtitle">Deutsch</span>
                            <div class="word-title">${currentItem.de}</div>
                            <span style="font-size:0.85rem; color:#60a5fa;">Tippe zum Umdrehen 🔄</span>
                        </div>
                        <div class="flip-card-back">
                            <span class="word-subtitle">${activeLang === 'en' ? 'Englisch 🇬🇧' : 'Türkisch 🇹🇷'}</span>
                            <div class="word-title" id="foreign-word-text">${currentItem.foreign}</div>
                            <div style="display:flex; gap:10px; justify-content:center;">
                                <button class="speech-btn" onclick="speakWord(event, '${currentItem.foreign}')">🗣️</button>
                            </div>
                        </div>
                    </div>
                </div>
                <div style="display:flex; gap:10px; margin-top:15px;">
                    <button onclick="rewardAndNext(2)" style="background:#16a34a; color:white; border:none; padding:12px; border-radius:12px; flex:1; font-weight:bold; cursor:pointer; font-size:1rem; box-shadow: 0 4px 10px rgba(22,163,74,0.3);">Gewusst! (+2 🪙)</button>
                    <button onclick="nextVocab()" style="background:#e11d48; color:white; border:none; padding:12px; border-radius:12px; flex:1; font-weight:bold; cursor:pointer; font-size:1rem;">Noch lernen</button>
                </div>
            `;
                box.innerHTML = cardHtml;
            } else if (activeMode === 'quiz') {
                // QUIZ-MODUS (MULTIPLE CHOICE)
                generateQuizOptions(currentItem, vocabList);
                let optionsHtml = `<h3 style="margin-bottom:15px; color:#cbd5e1; font-size:1.25rem;">Was bedeutet "${currentItem.de}"?</h3>`;
                quizOptions.forEach((opt, idx) => {
                    optionsHtml += `<button class="quiz-option" onclick="checkQuizAnswer(this, '${opt}', '${currentItem.foreign}')">${opt}</button>`;
                });
                box.innerHTML = optionsHtml;
            } else if (activeMode === 'type') {
                // TIPP-TRAINER (EINTIPPEN)
                const typeHtml = `
                <h3 style="margin-bottom:15px; color:#cbd5e1; font-size:1.25rem;">Schreibe "${currentItem.de}" auf ${activeLang === 'en' ? 'Englisch' : 'Türkisch'}:</h3>
                <input type="text" id="type-input" class="input-box" placeholder="Hier eintippen..." autocomplete="off">
                <button class="submit-btn" onclick="checkTypedAnswer('${currentItem.foreign}')">Prüfen & 10 Coins verdienen! 🚀</button>
            `;
                box.innerHTML = typeHtml;

                // Fokus auf das Input-Feld legen und Enter-Taste abfangen
                const inputField = document.getElementById("type-input");
                inputField.focus();
                inputField.addEventListener("keypress", function (event) {
                    if (event.key === "Enter") {
                        event.preventDefault();
                        checkTypedAnswer(currentItem.foreign);
                    }
                });
            }
        }

        function flipCard() {
            document.getElementById("main-card").classList.toggle("flipped");
        }

        function speakWord(event, text) {
            event.stopPropagation(); // Karte soll beim Klick auf den Sound nicht wieder umdrehen
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = activeLang === 'en' ? 'en-US' : 'tr-TR';
                window.speechSynthesis.speak(utterance);
            }
        }

        function generateQuizOptions(correctItem, list) {
            quizOptions = [correctItem.foreign];
            const copyList = list.filter(item => item.foreign !== correctItem.foreign);

            while (quizOptions.length < Math.min(4, list.length)) {
                const randomItem = copyList[Math.floor(Math.random() * copyList.length)];
                if (!quizOptions.includes(randomItem.foreign)) {
                    quizOptions.push(randomItem.foreign);
                }
            }
            quizOptions.sort(() => Math.random() - 0.5);
        }

        function checkQuizAnswer(button, selected, correct) {
            const options = document.querySelectorAll('.quiz-option');
            options.forEach(opt => opt.disabled = true);

            if (selected.trim().toLowerCase() === correct.trim().toLowerCase()) {
                button.classList.add('correct');
                confetti({ particleCount: 30, spread: 30 });
                rewardAndNext(5);
            } else {
                button.classList.add('wrong');
                options.forEach(opt => {
                    if (opt.innerText.trim().toLowerCase() === correct.trim().toLowerCase()) opt.classList.add('correct');
                });
                setTimeout(nextVocab, 2500);
            }
        }

        function checkTypedAnswer(correct) {
            const input = document.getElementById("type-input");
            const answer = input.value.trim().toLowerCase();

            if (answer === correct.toLowerCase()) {
                input.style.borderColor = "#22c55e";
                input.style.backgroundColor = "#052e16";
                confetti({ particleCount: 50, spread: 40 });
                rewardAndNext(10);
            } else {
                input.style.borderColor = "#ef4444";
                input.style.backgroundColor = "#450a0a";
                input.value = `Falsch! Richtig: ${correct}`;
                setTimeout(nextVocab, 3000);
            }
        }

        function rewardAndNext(coinReward) {
            if (playerName && playerName.toLowerCase() !== "admin") {
                db.ref("players/" + playerName.toLowerCase() + "/coins").transaction((c) => {
                    return (c || 0) + coinReward;
                });
            }
            setTimeout(nextVocab, 1200);
        }

        function nextVocab() {
            const vocabList = vocabData[activeLang][activeCategory].words;
            currentIndex = (currentIndex + 1) % vocabList.length;
            loadVocab();
        }

        window.onload = () => {
            if (!playerName) {
                window.location.href = "index.html";
            } else {
                populateCategories();
                loadVocab();
            }
        };
    </script>
</body>

</html>
