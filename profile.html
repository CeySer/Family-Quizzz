<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil bearbeiten - Family Quizzz</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: #0f111a;
            color: #ffffff;
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            text-align: center;
        }

        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border: 2px solid #1368ce;
            background-color: #1a1a2e;
            color: white;
            box-sizing: border-box;
            font-size: 1rem;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 10px;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        .custom-error-banner {
            display: none;
            background-color: #e94560;
            color: white;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-weight: bold;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            border: 2px solid #ff6b81;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2 style="color: #ff6b81;">Profil bearbeiten ⚙️</h2>

        <!-- FEHLER-ANZEIGER STATT BROWSER-ALERT -->
        <div id="error-banner" class="custom-error-banner"></div>

        <div
            style="background: #16213e; padding: 20px; border-radius: 12px; text-align: left; margin-bottom: 20px; box-shadow: 0 8px 16px rgba(0,0,0,0.3);">
            <label style="color: #aaa; font-size: 0.9rem;">Dein Name:</label>
            <input type="text" id="profile-name">

            <label style="color: #aaa; font-size: 0.9rem; margin-top: 15px; display: block;">Dein Alter (für faire
                Punkte):</label>
            <input type="number" id="profile-age" min="1" max="99">
        </div>

        <button onclick="saveProfile()" style="background-color: #26890c; color:white;">Speichern & zurück 💾</button>
        <button onclick="window.location.href='menu.html'" style="background-color: #555; color:white;">Abbrechen
            ❌</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAy5YkfW99nY3t1CxxrFI5dlqe4w2NZfj4",
            authDomain: "family-quizzz-80c40.firebaseapp.com",
            databaseURL: "https://family-quizzz-80c40-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "family-quizzz-80c40",
            storageBucket: "family-quizzz-80c40.firebasestorage.app",
            messagingSenderId: "30751445599",
            appId: "1:30751445599:web:28636f46555f5df49881ea"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let oldName = sessionStorage.getItem("current_quiz_player");

        if (!oldName) { window.location.href = "index.html"; }

        let oldKey = oldName.toLowerCase();
        let playerData = null;

        function showError(message) {
            const banner = document.getElementById("error-banner");
            banner.innerText = message;
            banner.style.display = "block";
            setTimeout(() => { banner.style.display = "none"; }, 4000);
        }

        db.ref("players/" + oldKey).once("value", (snapshot) => {
            playerData = snapshot.val();
            if (playerData) {
                document.getElementById("profile-name").value = playerData.name || oldName;
                document.getElementById("profile-age").value = playerData.age || "";
            }
        });

        function saveProfile() {
            let newName = document.getElementById("profile-name").value.trim();
            let newAge = parseInt(document.getElementById("profile-age").value);

            if (!newName) { showError("Bitte gib einen Namen ein!"); return; }
            if (!newAge || newAge < 1) { showError("Bitte gib ein gültiges Alter ein!"); return; }

            let newKey = newName.toLowerCase();

            if (newKey !== oldKey) {
                db.ref("players/" + newKey).once("value", (snapshot) => {
                    if (snapshot.exists()) {
                        showError("Dieser Name ist bereits vergeben!");
                    } else {
                        playerData.name = newName;
                        playerData.age = newAge;

                        db.ref("players/" + newKey).set(playerData, () => {
                            db.ref("players/" + oldKey).remove(() => {
                                sessionStorage.setItem("current_quiz_player", newName);
                                window.location.href = "menu.html";
                            });
                        });
                    }
                });
            } else {
                db.ref("players/" + oldKey).update({ age: newAge }, () => {
                    window.location.href = "menu.html";
                });
            }
        }
    </script>
</body>

</html>
