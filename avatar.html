<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avatar Shop - Family Quizzz</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>

<body>

    <div class="container" style="text-align: center;">
        <h2 style="color: #ff6b81;">Avatar Shop 🎨</h2>

        <div id="preview-avatar"
            style="font-size: 5rem; margin: 15px 0; background: #16213e; padding: 20px; border-radius: 15px;">🧑</div>
        <p style="color: #ffd700; font-size: 1.2rem; font-weight: bold;">🪙 Deine Coins: <span id="shop-coins">0</span>
        </p>

        <h3 style="color: #1368ce; margin-top: 20px;">Hüte & Kopfbedeckungen</h3>
        <div id="hats-shop-grid"
            style="display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; margin-bottom: 20px;">
        </div>

        <h3 style="color: #1368ce;">Brillen & Accessoires</h3>
        <div id="glasses-shop-grid"
            style="display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; margin-bottom: 20px;">
        </div>

        <button onclick="window.location.href='menu.html'"
            style="background: #e94560; color: white; padding: 12px 25px; border: none; border-radius: 10px; font-size: 1rem; cursor: pointer; width: 100%;">Zurück
            zum Hauptmenü 🔙</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAy5YkfW99nY3t1CxxrFI5dlqe4w2NZfj4",
            authDomain: "family-quizzz-80c40.firebaseapp.com",
            databaseURL: "https://family-quizzz-80c40-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "family-quizzz-80c40",
            storageBucket: "family-quizzz-80c40.firebasestorage.app",
            messagingSenderId: "30751445599",
            appId: "1:30751445599:web:28636f46555f5df49881ea"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let playerName = sessionStorage.getItem("current_quiz_player");
        let currentPlayer = null;

        const shopHats = [
            { id: "cap", label: "Basecap 🧢", price: 20, emoji: "🧢" },
            { id: "wizard", label: "Magierhut 🧙", price: 80, emoji: "🧙" },
            { id: "crown", label: "Goldene Krone 👑", price: 150, emoji: "👑" },
            { id: "cowboy", label: "Cowboyhut 🤠", price: 50, emoji: "🤠" },
            { id: "helmet", label: "KFZ-Helm 🪖", price: 60, emoji: "🪖" },
            { id: "halo", label: "Heiligenschein 😇", price: "epic", emoji: "😇" },
            { id: "detective", label: "Detektiv-Hut 🕵️", price: "epic", emoji: "🕵️" },
            { id: "devil", label: "Teufelshörner 😈", price: "epic", emoji: "😈" },
            { id: "ninja", label: "Ninja-Stirnband 🥷", price: "epic", emoji: "🥷" }
        ];

        const shopGlasses = [
            { id: "sun", label: "Sonnenbrille 😎", price: 30, emoji: "🕶️" },
            { id: "nerd", label: "Nerdbrille 🤓", price: 20, emoji: "🤓" },
            { id: "heart", label: "Herzchenbrille ❤️", price: 90, emoji: "❤️" },
            { id: "laser", label: "Laser-Brille ⚡", price: "epic", emoji: "⚡" },
            { id: "pirate_eye", label: "Augenklappe 🏴‍☠️", price: "epic", emoji: "👁️‍🗨️" },
            { id: "vr", label: "VR-Brille 🕶️", price: "epic", emoji: "🥽" }
        ];

        db.ref("players/" + playerName.toLowerCase()).on("value", (snapshot) => {
            currentPlayer = snapshot.val();
            if (currentPlayer) {
                if (!currentPlayer.unlockedHats) currentPlayer.unlockedHats = [];
                if (!currentPlayer.unlockedGlasses) currentPlayer.unlockedGlasses = [];
                document.getElementById("shop-coins").innerText = currentPlayer.coins || 0;
                updatePreview();
                renderShop();
            }
        });

        function updatePreview() {
            let base = currentPlayer.avatar ? currentPlayer.avatar.base || "🧑" : "🧑";
            let hat = currentPlayer.avatar ? currentPlayer.avatar.hat || "" : "";
            let glasses = currentPlayer.avatar ? currentPlayer.avatar.glasses || "" : "";
            document.getElementById("preview-avatar").innerText = `${base}${hat}${glasses}`;
        }

        function renderShop() {
            const hatsGrid = document.getElementById("hats-shop-grid");
            const glassesGrid = document.getElementById("glasses-shop-grid");
            hatsGrid.innerHTML = `<button style="padding:10px; background:#1f4068; color:white; border:none; border-radius:8px; cursor:pointer;" onclick="equipItem('hat', '')">❌ Kein Hut</button>`;
            glassesGrid.innerHTML = `<button style="padding:10px; background:#1f4068; color:white; border:none; border-radius:8px; cursor:pointer;" onclick="equipItem('glasses', '')">❌ Keine Brille</button>`;

            shopHats.forEach(item => {
                const isUnlocked = currentPlayer.unlockedHats.includes(item.id);
                const btn = document.createElement("button");
                btn.style.cssText = `padding:10px; border-radius:8px; cursor:pointer; color:white; background:${isUnlocked ? '#1f4068' : '#0f3460'}; border:${item.price === 'epic' ? '2px solid #ffd700' : '1px solid #333'}`;

                if (item.price === "epic") {
                    btn.innerHTML = isUnlocked ? `${item.label}<br><span style="color:#26890c;font-size:0.75rem;">Auswählen</span>` : `${item.label}<br><span style="color:#ffd700;font-size:0.75rem;">⭐ EPISCH (Kiste)</span>`;
                    btn.onclick = () => isUnlocked ? equipItem('hat', item.emoji) : alert("Dieses epische Item gibt es nur aus Lern-Schatzkisten!");
                } else {
                    btn.innerHTML = isUnlocked ? `${item.label}<br><span style="color:#26890c;font-size:0.75rem;">Auswählen</span>` : `${item.label}<br><span style="color:#ffd700;font-size:0.75rem;">🪙 ${item.price}</span>`;
                    btn.onclick = () => isUnlocked ? equipItem('hat', item.emoji) : buyItem('hat', item);
                }
                hatsGrid.appendChild(btn);
            });

            shopGlasses.forEach(item => {
                const isUnlocked = currentPlayer.unlockedGlasses.includes(item.id);
                const btn = document.createElement("button");
                btn.style.cssText = `padding:10px; border-radius:8px; cursor:pointer; color:white; background:${isUnlocked ? '#1f4068' : '#0f3460'}; border:${item.price === 'epic' ? '2px solid #ffd700' : '1px solid #333'}`;

                if (item.price === "epic") {
                    btn.innerHTML = isUnlocked ? `${item.label}<br><span style="color:#26890c;font-size:0.75rem;">Auswählen</span>` : `${item.label}<br><span style="color:#ffd700;font-size:0.75rem;">⭐ EPISCH (Kiste)</span>`;
                    btn.onclick = () => isUnlocked ? equipItem('glasses', item.emoji) : alert("Dieses epische Item gibt es nur aus Lern-Schatzkisten!");
                } else {
                    btn.innerHTML = isUnlocked ? `${item.label}<br><span style="color:#26890c;font-size:0.75rem;">Auswählen</span>` : `${item.label}<br><span style="color:#ffd700;font-size:0.75rem;">🪙 ${item.price}</span>`;
                    btn.onclick = () => isUnlocked ? equipItem('glasses', item.emoji) : buyItem('glasses', item);
                }
                glassesGrid.appendChild(btn);
            });
        }

        function buyItem(type, item) {
            if (currentPlayer.coins >= item.price) {
                currentPlayer.coins -= item.price;
                if (type === 'hat') currentPlayer.unlockedHats.push(item.id);
                if (type === 'glasses') currentPlayer.unlockedGlasses.push(item.id);
                equipItem(type, item.emoji);
            } else { alert("Nicht genug Coins!"); }
        }

        function equipItem(type, emoji) {
            if (!currentPlayer.avatar) currentPlayer.avatar = {};
            currentPlayer.avatar[type] = emoji;
            db.ref("players/" + playerName.toLowerCase()).set(currentPlayer);
        }
    </script>
</body>

</html>
