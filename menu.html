<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zentrale - Family Quizzz</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding-bottom: 70px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 15px;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #1e293b;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 2px solid #334155;
            z-index: 1000;
        }

        .nav-item {
            background: none;
            border: none;
            color: #94a3b8;
            font-weight: bold;
            font-size: 0.85rem;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .nav-item.active {
            color: #3b82f6;
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            margin-bottom: 15px;
        }

        .section-title {
            font-size: 1.2rem;
            color: #3b82f6;
            font-weight: bold;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        select {
            width: 100%;
            padding: 12px;
            background: #334155;
            border: 2px solid #475569;
            color: white;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            margin-bottom: 12px;
            outline: none;
            box-sizing: border-box;
        }

        .start-btn {
            background: #10b981;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="container">
        <div id="page-home" class="page active">
            <div class="card"
                style="display: flex; align-items: center; justify-content: space-between; background: linear-gradient(135deg, #1e3a8a, #1e293b);">
                <div style="display: flex; align-items: center; gap: 12px;">
                    <div id="mini-avatar" style="font-size: 2.3rem;">🧑</div>
                    <div>
                        <span id="welcome-text" style="font-weight: bold; font-size: 1.25rem;">Lade...</span><br>
                        <span style="color: #fbbf24; font-weight: bold;">🪙 <span id="menu-coins">0</span> Coins</span>
                    </div>
                </div>
            </div>

            <div class="card" style="border: 2px solid #3b82f6;">
                <div class="section-title">🎒 2. Wissens-Quiz</div>
                <label style="font-size:0.8rem; color:#94a3b8; font-weight:bold;">HAUPTKATEGORIE:</label>
                <select id="main-category" onchange="updateSubCategories()">
                    <option value="schule2">🏫 Grundschule - Klasse 2</option>
                    <option value="schule5">🇬🇧 Weiterführende Schule - Klasse 5</option>
                    <option value="kfz">🔧 KFZ-Mechatroniker</option>
                    <option value="allgemein">🕌 Kultur & Sprachen</option>
                </select>
                <label style="font-size:0.8rem; color:#94a3b8; font-weight:bold;">UNTERKATEGORIE:</label>
                <select id="sub-category"></select>
                <button onclick="startQuiz()" class="start-btn">Quiz starten! 🚀</button>
            </div>
        </div>

        <!-- Restliche Seiten (Leaderboard, Workshop, Parent) bleiben hier wie zuvor... -->
    </div>

    <script src="questions.js"></script>
    <script>
        // ... (Firebase Konfiguration wie gehabt) ...

        const subCategories = {
            schule2: [
                { value: "klasse2_mathe", text: "🧮 Mathematik" },
                { value: "klasse2_deutsch", text: "📖 Deutsch & Märchen" }
            ],
            schule5: [
                { value: "klasse5_englisch", text: "🇬🇧 Englisch-Training" }
            ],
            kfz: [
                { value: "kfz_lf1", text: "🔧 LF 1: Wartung & Pflege" },
                { value: "kfz_lf2", text: "⚙️ LF 2: Motor-Baugruppen" },
                { value: "kfz_lf3", text: "⚡ LF 3: Elektrische Systeme" },
                { value: "kfz_lf4", text: "💻 LF 4: Regler-Systeme" }
            ],
            allgemein: [
                { value: "sprachen", text: "🗣️ Sprachen lernen" },
                { value: "islam", text: "🕌 Islam-Wissen" }
            ]
        };

        function updateSubCategories() {
            const mainCat = document.getElementById("main-category").value;
            const subSelect = document.getElementById("sub-category");
            subSelect.innerHTML = "";

            subCategories[mainCat].forEach(sub => {
                // ZÄHLER LOGIK: Wie viele Fragen gibt es für diesen Wert?
                const count = allQuestions.filter(q => q.category === sub.value).length;
                const opt = document.createElement("option");
                opt.value = sub.value;
                opt.innerText = `${sub.text} (${count} Fragen)`;
                subSelect.appendChild(opt);
            });
        }

        // Beim Laden einmal ausführen, um die Zähler zu setzen
        window.onload = () => {
            // ... (Initialisierung wie gehabt) ...
            updateSubCategories();
        };

        // ... (restliche Funktionen) ...
    </script>
</body>

</html>
